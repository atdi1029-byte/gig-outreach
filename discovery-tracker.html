<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Discovery Tracker</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
:root {
  --bg: #0c1a22;
  --card: #112028;
  --border: #1a2e3a;
  --text: #e0e0e0;
  --muted: #888;
  --teal: #6ecfcf;
  --orange: #e8944c;
  --green: #8bc34a;
  --red: #ef5350;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  padding: 20px;
  max-width: 1000px;
  margin: 0 auto;
  line-height: 1.5;
}
h1 {
  color: var(--teal);
  font-size: 1.8rem;
  margin-bottom: 4px;
}
.subtitle {
  color: var(--muted);
  font-size: 0.9rem;
  margin-bottom: 20px;
}
.stats-bar {
  display: flex;
  gap: 15px;
  flex-wrap: wrap;
  margin-bottom: 25px;
}
.stat {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 20px;
  text-align: center;
  min-width: 120px;
}
.stat-num {
  font-size: 1.8rem;
  font-weight: 700;
  color: var(--teal);
  display: block;
}
.stat-label {
  font-size: 0.75rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 1px;
}
.progress-bar {
  width: 100%;
  height: 8px;
  background: var(--border);
  border-radius: 4px;
  margin-bottom: 25px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--teal), var(--green));
  border-radius: 4px;
  transition: width 0.3s;
}
.controls {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}
.controls input {
  flex: 1;
  min-width: 200px;
  padding: 8px 14px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-size: 0.9rem;
}
.controls input::placeholder { color: #555; }
.filter-btn {
  padding: 8px 16px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--muted);
  cursor: pointer;
  font-size: 0.85rem;
  transition: all 0.2s;
}
.filter-btn:hover,
.filter-btn.active {
  background: var(--teal);
  color: var(--bg);
  border-color: var(--teal);
}
.region {
  margin-bottom: 20px;
}
.region-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 15px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px 8px 0 0;
  cursor: pointer;
  user-select: none;
}
.region-header h2 {
  color: var(--orange);
  font-size: 1.1rem;
  font-weight: 600;
}
.region-progress {
  font-size: 0.85rem;
  color: var(--muted);
}
.region-progress .done {
  color: var(--green);
  font-weight: 600;
}
.city-list {
  border: 1px solid var(--border);
  border-top: none;
  border-radius: 0 0 8px 8px;
  overflow: hidden;
}
.city-row {
  display: flex;
  align-items: center;
  padding: 8px 15px;
  border-bottom: 1px solid var(--border);
  transition: background 0.15s;
}
.city-row:last-child { border-bottom: none; }
.city-row:hover { background: #0f242e; }
.city-row.swept { opacity: 0.6; }
.city-row.swept .city-name {
  text-decoration: line-through;
  color: var(--muted);
}
.city-cb {
  width: 20px;
  height: 20px;
  accent-color: var(--teal);
  cursor: pointer;
  margin-right: 12px;
  flex-shrink: 0;
}
.city-name {
  flex: 1;
  font-size: 0.95rem;
}
.city-tier {
  font-size: 0.7rem;
  padding: 2px 8px;
  border-radius: 4px;
  font-weight: 600;
  margin-left: 8px;
  flex-shrink: 0;
}
.tier-1 { background: #1a3a1a; color: #8bc34a; }
.tier-2 { background: #1a2e3a; color: #4fc3f7; }
.tier-3 { background: #2e2a1a; color: #ffd54f; }
.city-note {
  font-size: 0.8rem;
  color: var(--muted);
  margin-left: 10px;
  flex-shrink: 0;
}
.city-count {
  font-size: 0.8rem;
  color: var(--teal);
  margin-left: 8px;
  flex-shrink: 0;
  min-width: 20px;
  text-align: right;
}
.hidden { display: none; }
@media (max-width: 600px) {
  body { padding: 12px; }
  h1 { font-size: 1.4rem; }
  .stats-bar { gap: 8px; }
  .stat { padding: 8px 12px; min-width: 80px; }
  .stat-num { font-size: 1.4rem; }
  .city-note { display: none; }
}
</style>
</head>

<h1>Discovery Tracker</h1>
<p class="subtitle">Every city in the 2-hour radius.
Check off as you sweep each one for venues.</p>

<div class="stats-bar">

</div>

<div class="progress-bar">

<div class="controls">

// ============================================================
// STATE
// ============================================================
let swept = {};
let venuesCounts = {};
let filter = 'all';

function load() {
  try {
    swept = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
    venuesCounts = JSON.parse(
      localStorage.getItem(VENUES_KEY)
    ) || {};
  } catch(e) {
    swept = {};
    venuesCounts = {};
  }
}

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(swept));
  localStorage.setItem(VENUES_KEY, JSON.stringify(venuesCounts));
}

function cityKey(region, city) {
  return region + '::' + city;
}

// ============================================================
// RENDER
// ============================================================
function render() {
  const searchVal = document.getElementById('search')
    .value.toLowerCase();
  const container = document.getElementById('regions');
  container.innerHTML = '';

  let totalCities = 0;
  let sweptCities = 0;
  let totalVenues = 0;

  REGIONS.forEach(region => {
    const div = document.createElement('div');
    div.className = 'region';

    let regionTotal = 0;
    let regionSwept = 0;
    let visibleCities = [];

    region.cities.forEach(city => {
      const key = cityKey(region.name, city.name);
      const isSw = !!swept[key];
      totalCities++;
      if (isSw) sweptCities++;
      const vc = venuesCounts[key] || 0;
      totalVenues += vc;
      regionTotal++;
      if (isSw) regionSwept++;

      // Filter logic
      if (filter === 'remaining' && isSw) return;
      if (filter === 'swept' && !isSw) return;
      if (searchVal && !city.name.toLowerCase()
        .includes(searchVal)
        && !(city.note || '').toLowerCase()
        .includes(searchVal)
        && !region.name.toLowerCase()
        .includes(searchVal)) return;

      visibleCities.push({ city, key, isSw, vc });
    });

    if (visibleCities.length === 0) return;

    // Region header
    const hdr = document.createElement('div');
    hdr.className = 'region-header';
    hdr.innerHTML = `
      <h2>${region.name}</h2>
      <span class="region-progress">
        <span class="done">${regionSwept}</span>
        / ${regionTotal}
      </span>
    `;
    div.appendChild(hdr);

    // City list
    const list = document.createElement('div');
    list.className = 'city-list';

    visibleCities.forEach(({ city, key, isSw, vc }) => {
      const row = document.createElement('div');
      row.className = 'city-row' + (isSw ? ' swept' : '');

      const tierClass = 'tier-' + city.tier;
      const tierLabel = city.tier === 1 ? 'T1'
        : city.tier === 2 ? 'T2' : 'T3';

      row.innerHTML = `
        <input type="checkbox" class="city-cb"
          data-key="${key}"
          ${isSw ? 'checked' : ''}>
        <span class="city-name">${city.name}</span>
        <span class="city-tier ${tierClass}">${tierLabel}</span>
        ${city.note
          ? `<span class="city-note">${city.note}</span>`
          : ''}
        <input type="number" class="city-count"
          data-key="${key}" value="${vc}" min="0"
          style="width:45px;background:var(--card);
          border:1px solid var(--border);border-radius:4px;
          color:var(--teal);text-align:center;font-size:0.8rem;
          padding:2px;margin-left:8px;"
          title="Venues found">
      `;
      list.appendChild(row);
    });

    div.appendChild(list);
    container.appendChild(div);
  });

  // Update stats
  document.getElementById('swept-count')
    .textContent = sweptCities;
  document.getElementById('total-count')
    .textContent = totalCities;
  const pctVal = totalCities
    ? Math.round(sweptCities / totalCities * 100) : 0;
  document.getElementById('pct').textContent = pctVal + '%';
  document.getElementById('venues-found')
    .textContent = totalVenues;
  document.getElementById('progress-fill')
    .style.width = pctVal + '%';
}

// ============================================================
// EVENTS
// ============================================================
document.addEventListener('change', e => {
  if (e.target.classList.contains('city-cb')) {
    const key = e.target.dataset.key;
    if (e.target.checked) {
      swept[key] = Date.now();
    } else {
      delete swept[key];
    }
    save();
    render();
  }
  if (e.target.classList.contains('city-count')) {
    const key = e.target.dataset.key;
    venuesCounts[key] = parseInt(e.target.value) || 0;
    save();
    render();
  }
});

document.getElementById('search')
  .addEventListener('input', render);

document.querySelectorAll('.filter-btn')
  .forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn')
        .forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      filter = btn.dataset.filter;
      render();
    });
  });

// ============================================================
// INIT
// ============================================================
load();
render();
</script>
</body>
</html>
