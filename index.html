function onGigVenueChange() {
    const sel = document.getElementById('gigVenueSelect');
    const nameRow = document.getElementById('gigNameRow');
    const opt = sel.options[sel.selectedIndex];
    if (sel.value) {
        nameRow.style.display = 'none';
        document.getElementById('gigVenueName').value = opt.getAttribute('data-name') || '';
        // Auto-set category from venue
        const vCat = (opt.getAttribute('data-cat') || '').toLowerCase().replace(/[\s\/]/g, '_');
        if (vCat) document.getElementById('gigCategory').value = vCat;
    } else {
        nameRow.style.display = '';
    }
}

function setRating(key, val) {
    const dots = document.querySelectorAll(`#dots_${key} .rating-dot`);
    dots.forEach(d => {
        const dv = parseInt(d.getAttribute('data-val'));
        if (dv <= val) d.classList.add('active');
        else d.classList.remove('active');
    });
    updateOverall();
}

function getRating(key) {
    const dots = document.querySelectorAll(`#dots_${key} .rating-dot.active`);
    return dots.length || 5;
}

function updateOverall() {
    const tips = getRating('tips');
    const rebooked = getRating('rebooked');
    const audience = getRating('audience');
    const quality = getRating('quality');
    const avg = (tips + rebooked + audience + quality) / 4;
    const el = document.getElementById('gigOverall');
    if (el) {
        el.textContent = avg.toFixed(1);
        el.style.color = avg >= 8 ? 'var(--green)' : avg >= 5 ? 'var(--gold)' : 'var(--red)';
    }
}

function saveGig(gigId) {
    const venueId = document.getElementById('gigVenueSelect').value || '';
    const venueName = venueId ? document.getElementById('gigVenueSelect').options[document.getElementById('gigVenueSelect').selectedIndex].getAttribute('data-name') : document.getElementById('gigVenueName').value.trim();
    const date = document.getElementById('gigDate').value;
    const category = document.getElementById('gigCategory').value;
    const notes = document.getElementById('gigNotes').value.trim();
    const tips = getRating('tips');
    const rebooked = getRating('rebooked');
    const audience = getRating('audience');
    const quality = getRating('quality');

    if (!venueName) { showToast('Enter a venue name'); return; }

    const params = {
        action: gigId ? 'update_gig' : 'add_gig',
        venue_name: venueName,
        venue_id: venueId,
        date: date,
        category: category,
        rating_tips: tips,
        rating_rebooked: rebooked,
        rating_audience: audience,
        rating_venue_quality: quality,
        notes: notes
    };
    if (gigId) params.gig_id = gigId;

    showToast('Saving...');
    fireGet(buildUrl(params), function(resp) {
        if (resp.status === 'ok') {
            showToast(gigId ? 'Gig updated!' : 'Gig saved!');
            goBack();
            setTimeout(loadDashboard, 500);
        } else {
            showToast('Error: ' + (resp.message || 'Unknown'));
        }
    });
}

function deleteGig(gigId) {
    if (!confirm('Delete this gig?')) return;
    // Use update_gig with a special flag — or we add a delete_gig action
    // For now, just mark as deleted by clearing the venue_name
    showToast('Deleting...');
    fireGet(buildUrl({ action: 'update_gig', gig_id: gigId, venue_name: '(DELETED)' }), function(resp) {
        showToast('Deleted');
        goBack();
        setTimeout(loadDashboard, 500);
    });
}

// === SMART PICKS (Recommendation Engine) ===
let smartPicksData = null;
let allSmartPicks = [];

function toggleSmartPicks() {
    const list = document.getElementById('smartPicksList');
    list.classList.toggle('collapsed');
}

function loadSmartPicks() {
    // Only load if we have past gigs
    const gigs = (dashboardData && dashboardData.gigs) || [];
    if (gigs.length === 0) {
        document.getElementById('smartPicksSection').style.display = 'none';
        return;
    }

    jsonpFetch(buildUrl({ action: 'get_recommendations' }), function(err, data) {
        if (err || !data || data.status !== 'ok') return;
        smartPicksData = data;
        renderSmartPicks(data.recommendations || [], data.profile || {});
    });
}

function renderSmartPicks(recs, profile) {
    const section = document.getElementById('smartPicksSection');
    const list = document.getElementById('smartPicksList');
    const badge = document.getElementById('smartPicksBadge');

    // Exclude past gig venues — you already play there
    const gigVenueIds = new Set(((dashboardData && dashboardData.gigs) || []).map(g => g.venue_id).filter(Boolean));
    const stripThe = s => s.toLowerCase().trim().replace(/^the\s+/, '');
    const gigNames = new Set(((dashboardData && dashboardData.gigs) || []).map(g => stripThe(g.venue_name)).filter(Boolean));
    // Show top 8 recommendations that aren't past gigs or already contacted
    const allFiltered = recs.filter(r => {
        if (gigVenueIds.has(r.venue_id)) return false;
        if (gigNames.has(stripThe(r.name))) return false;
        const v = ((dashboardData && dashboardData.venues) || []).find(v => v.venue_id === r.venue_id);
        if (v && ['pipelined','contacted'].includes(v.status)) return false;
        return true;
    });
    const filtered = allFiltered.slice(0, 8);

    if (allFiltered.length === 0) {
        section.style.display = 'none';
        return;
    }

    section.style.display = '';
    badge.textContent = allFiltered.length;
    allSmartPicks = allFiltered;

    // Build "why" reason for each pick
    const gigs = (dashboardData && dashboardData.gigs) || [];
    const bestCat = profile.best_category || '';

    list.innerHTML = filtered.map(r => {
        const score = r.recommendation_score;
        const scoreColor = score >= 70 ? 'var(--gold)' : score >= 40 ? 'var(--text)' : 'var(--text-dim)';
        const cat = (r.category || 'other').toLowerCase().replace(/[\s\/]/g, '_');
        const bd = r.score_breakdown || {};

        // Build reason string
        let reasons = [];
        if (bd.category >= 20 && bestCat) {
            // Find best gig in this category
            const catGigs = gigs.filter(g => g.category.toLowerCase() === r.category.toLowerCase());
            if (catGigs.length > 0) {
                const best = catGigs.reduce((a, b) => a.overall_score > b.overall_score ? a : b);
                reasons.push(`${CATEGORY_LABELS[cat] || r.category} scored ${best.overall_score.toFixed(1)}/10 at ${best.venue_name}`);
            } else {
                reasons.push(`Similar to your top category: ${bestCat}`);
            }
        }
        if (bd.zone >= 7) reasons.push('Great zone');
        if (bd.distance >= 18) reasons.push('Ideal distance');
        if (bd.contact_quality >= 7) reasons.push('Good contacts');

        let html = `<div class="smart-pick-card" onclick="openVenueDetail('${esc(r.venue_id)}')">`;
        html += `<div class="smart-pick-top">`;
        html += `<div class="smart-pick-score" style="color:${scoreColor}">${score}</div>`;
        html += `<div class="smart-pick-info">`;
        html += `<div class="smart-pick-name">${esc(r.name)}</div>`;
        html += `<div class="smart-pick-meta"><span class="category-badge ${cat}">${esc((r.category || '').toUpperCase())}</span> ${esc(r.city || '')}${r.state ? ', ' + esc(r.state) : ''}${r.distance_miles ? ' · ' + r.distance_miles + ' mi' : ''}</div>`;
        html += `</div></div>`;
        if (reasons.length > 0) {
            html += `<div class="smart-pick-reason">${esc(reasons[0])}</div>`;
        }
        html += `</div>`;
        return html;
    }).join('');
    if (allFiltered.length > 8) {
        list.innerHTML += `<div style="text-align:center;margin:0.5rem 0"><button onclick="openAllSmartPicks()" style="background:var(--gold);color:#111;border:none;border-radius:6px;padding:0.4rem 1.2rem;font-family:'Lato',sans-serif;font-weight:700;font-size:0.75rem;cursor:pointer">View All ${allFiltered.length} Picks</button></div>`;
    }
}

function openAllSmartPicks() {
    const gigs = (dashboardData && dashboardData.gigs) || [];
    const profile = (smartPicksData && smartPicksData.profile) || {};
    const bestCat = profile.best_category || '';
    let rows = allSmartPicks.map((r, i) => {
        const score = r.recommendation_score;
        const cat = (r.category || 'other').toLowerCase().replace(/[\s\/]/g, '_');
        const bd = r.score_breakdown || {};
        let reason = '';
        if (bd.category >= 20 && bestCat) {
            const catGigs = gigs.filter(g => g.category.toLowerCase() === r.category.toLowerCase());
            if (catGigs.length > 0) {
                const best = catGigs.reduce((a, b) => a.overall_score > b.overall_score ? a : b);
                reason = `${CATEGORY_LABELS[cat] || r.category} scored ${best.overall_score.toFixed(1)}/10 at ${best.venue_name}`;
            }
        }
        const scoreColor = score >= 70 ? '#f0a030' : score >= 40 ? '#e0e0e0' : '#888';
        const catColors = {winery:'#9b59b6',museum:'#3498db',hotel:'#e67e22',country_club:'#27ae60',event:'#e74c3c',restaurant:'#f39c12'};
        const catColor = catColors[cat] || '#666';
        return `<tr>
            <td style="color:${scoreColor};font-weight:700;font-size:1.1rem;text-align:center">${score}</td>
            <td><strong>${r.name}</strong><br><span style="font-size:0.7rem;background:${catColor};padding:1px 6px;border-radius:3px;color:#fff">${(r.category||'').toUpperCase()}</span> <span style="color:#888;font-size:0.75rem">${r.city||''}${r.state?', '+r.state:''}</span></td>
            <td style="text-align:center;color:#888">${r.distance_miles ? r.distance_miles+' mi' : '—'}</td>
            <td style="text-align:center">${r.contact_count||0}</td>
            <td style="color:#f0a030;font-size:0.7rem;font-style:italic">${reason}</td>
        </tr>`;
    }).join('');
    const w = window.open('', '_blank');
    w.document.write(`<!DOCTYPE html><html><head><title>All Smart Picks</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
body{background:#0a0a0a;color:#e0e0e0;font-family:'Lato',sans-serif;padding:1.5rem;margin:0}
h1{font-family:'Cinzel',serif;color:#f0a030;margin-bottom:1rem;font-size:1.4rem}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:0.5rem;border-bottom:2px solid #333;color:#888;font-size:0.7rem;text-transform:uppercase}
td{padding:0.5rem;border-bottom:1px solid #1a1a1a;vertical-align:top}
tr:hover{background:rgba(240,160,48,0.05)}
</style></head><body>
<h1>Smart Picks — All ${allSmartPicks.length} Venues</h1>
<table><thead><tr><th>Score</th><th>Venue</th><th>Distance</th><th>Contacts</th><th>Why</th></tr></thead>
<tbody>${rows}</tbody></table></body></html>`);
    w.document.close();
}

function updateGigsCount() {
    const gigs = (dashboardData && dashboardData.gigs) || [];
    // Filter out deleted gigs
    const active = gigs.filter(g => g.venue_name !== '(DELETED)');
    document.getElementById('gigsCount').textContent = active.length;
}
