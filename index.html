    // Notes input — editable feedback for learnings
    html += `<div style="margin:0.8rem 0">`;
    html += `<textarea id="detailNote" placeholder="Notes — why is this a good or bad fit?" style="width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.15);color:#e0e0e0;border-radius:8px;padding:0.6rem;font-size:0.85rem;font-family:inherit;resize:vertical;min-height:2.5rem;max-height:8rem">${esc(curFeedback)}</textarea>`;
    html += `<button onclick="saveDetailNote('${esc(venue.venue_id)}')" style="margin-top:0.4rem;background:none;border:1px solid var(--accent);color:var(--accent);padding:0.3rem 0.8rem;border-radius:6px;font-size:0.75rem;cursor:pointer">Save Note</button>`;
    html += `</div>`;

    // Emails
    const skipWords = getSkipWords();
    const emailContacts = contacts.filter(c => c.email && (c.verified === 'valid' || c.verified === 'catch-all' || c.verified === 'unknown'));
    let hiddenCount = 0;
    if (emailContacts.length > 0) {
        html += `<div class="detail-section-label" style="background:${catColor}">Emails</div>`;
        for (const c of emailContacts) {
            const skipped = shouldSkipContact(c.title);
            const starred = isStarredContact(c.title);
            if (skipped) hiddenCount++;
            if (c.email_sent) {
                const doneLabel = c.email_sent === 'skipped' ? 'Skipped' : 'Sent';
                html += `<div class="detail-action-row"><span class="detail-email" style="opacity:0.4">${esc(c.email)}</span><span class="detail-done">${doneLabel}</span></div>`;
            } else if (c.verified === 'valid' || c.verified === 'catch-all' || c.verified === 'unknown') {
                html += `<div class="contact-wrapper${skipped ? ' contact-skipped' : ''}${starred ? ' contact-starred' : ''}">`;
                html += `<div class="detail-action-row"><span class="detail-email">${esc(c.email)}</span>`;
                html += `<button class="btn-action btn-copy" onclick="copyText('${esc(c.email)}')">Copy</button>`;
                html += `<button class="btn-action btn-gmail" onclick="openComposeForContact('${esc(c.contact_id)}','${esc(c.email)}','${esc(c.name || '')}','email')">Gmail</button>`;
                html += `<button class="btn-action btn-sent" onclick="markEmailSent('${esc(c.contact_id)}','${esc(venue.venue_id)}','${cat}',this)">Sent</button>`;
                html += `<button class="btn-action btn-del" onclick="skipContact('${esc(c.contact_id)}',this)">✕</button></div>`;
                if (c.name || c.title) html += `<div class="detail-contact-name">${renderTitleWords(c.name, c.title)}</div>`;
                html += `</div>`;
            } else {
                html += `<div class="detail-action-row"><span class="detail-email" style="opacity:0.5">${esc(c.email)}</span>`;
                html += `<span style="font-size:0.6rem;color:var(--text-dim)">${c.verified || 'unverified'}</span></div>`;
            }
        }
        const starWords = getStarWords();
        if (hiddenCount > 0 || starWords.length > 0) {
            const parts = [];
            if (hiddenCount > 0) parts.push(hiddenCount + ' hidden');
            if (starWords.length > 0) parts.push(starWords.length + ' starred');
            html += `<div class="hidden-count" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='flex'?'none':'flex'">${parts.join(', ')} — manage filters</div>`;
            html += `<div class="skip-words-bar" style="display:none">`;
            for (const w of starWords) {
                html += `<span class="star-pill" onclick="removeStarWord('${esc(w)}');openVenueDetail('${esc(venueId)}')">⭐ ${esc(w)} ✕</span>`;
            }
            for (const w of skipWords) {
                html += `<span class="skip-pill" onclick="removeSkipWord('${esc(w)}');openVenueDetail('${esc(venueId)}')">${esc(w)} ✕</span>`;
            }
            html += `</div>`;
        }
    }

    // LinkedIn pending (show above Instagram so it's visible)
    if (venue.linkedin_pending) {
        html += `<div class="detail-section-label" style="background:#9b59b6">LinkedIn</div>`;
        html += `<div class="detail-action-row"><span class="detail-social-label" style="color:#d4a5ff">LinkedIn pending — needs scrape</span></div>`;
    }

    // Instagram (only show if we have it AND not yet sent)
    if (venue.instagram) {
        const igDone = contacts.some(c => c.ig_dm_sent);
        if (!igDone) {
            html += `<div class="detail-section-label" style="background:${catColor}">Instagram</div>`;
            const fc = contacts[0] || { contact_id: '' };
            html += `<div class="detail-action-row"><span class="detail-social-label">Instagram DM</span>`;
            html += `<button class="btn-action btn-open" onclick="openComposeForContact('${esc(fc.contact_id)}','','','ig')">Open + Copy</button>`;
            html += `<button class="btn-action btn-sent" onclick="markIGSent('${esc(fc.contact_id)}','${esc(venue.venue_id)}',this)">Sent</button></div>`;
        }
    }

    // Facebook (only show if we have it AND not yet sent)
    if (venue.facebook) {
        const fbDone = contacts.some(c => c.fb_msg_sent);
        if (!fbDone) {
            html += `<div class="detail-section-label" style="background:${catColor}">Facebook</div>`;
            const fc = contacts[0] || { contact_id: '' };
            html += `<div class="detail-action-row"><span class="detail-social-label">Facebook Message</span>`;
            html += `<button class="btn-action btn-open" onclick="openComposeForContact('${esc(fc.contact_id)}','','','fb')">Open + Copy</button>`;
            html += `<button class="btn-action btn-sent" onclick="markFBSent('${esc(fc.contact_id)}','${esc(venue.venue_id)}',this)">Sent</button></div>`;
        }
    }

    // Contact Form (if available)
    if (venue.contact_form) {
        html += `<div class="detail-section-label" style="background:${catColor}">Contact Form</div>`;
        html += `<div class="detail-action-row"><span class="detail-social-label">Website Form</span>`;
        html += `<button class="btn-action btn-open" onclick="window.open('${esc(venue.contact_form)}','_blank')">Open</button></div>`;
    }

    // If nothing actionable, show a message
    const hasUnsent = emailContacts.some(c => !c.email_sent);
    const igPending = venue.instagram && !contacts.some(c => c.ig_dm_sent);
    const fbPending = venue.facebook && !contacts.some(c => c.fb_msg_sent);
    if (!hasUnsent && !igPending && !fbPending) {
        if (emailContacts.length === 0 && !venue.instagram && !venue.facebook && !venue.contact_form) {
            html += `<div style="text-align:center;padding:2rem 1rem;color:var(--text-dim);font-size:0.8rem">Needs pipeline — no contacts scraped yet</div>`;
        } else {
            html += `<div style="text-align:center;padding:2rem 1rem;color:var(--green);font-size:0.8rem">All outreach complete</div>`;
        }
    }

    // Mark Done / Reset buttons
    html += `<div style="text-align:center;padding:1.5rem 1rem;display:flex;gap:0.75rem;justify-content:center">`;
    if (venue.status !== 'contacted' || isResurfaced(venue)) {
        html += `<button onclick="markVenueDone('${esc(venue.venue_id)}')" style="background:none;border:1px solid var(--green);color:var(--green);padding:0.6rem 1.2rem;border-radius:8px;font-size:0.85rem;cursor:pointer">Mark Done</button>`;
    } else {
        html += `<button onclick="resetVenue('${esc(venue.venue_id)}')" style="background:none;border:1px solid var(--accent);color:var(--accent);padding:0.6rem 1.2rem;border-radius:8px;font-size:0.85rem;cursor:pointer">Reset — Re-scrape</button>`;
    }
    html += `</div>`;

    document.getElementById('detailBody').innerHTML = html;
    window._currentVenueId = venueId;
    if (navStack[navStack.length - 1] !== 'viewDetail') navigateTo('viewDetail');
}

// === HELPERS ===
const RESURFACE_DAYS = 912; // 2.5 years
function isResurfaced(venue) {
    if (venue.status !== 'contacted' || !venue.contacted_date) return false;
    const contacted = new Date(venue.contacted_date);
    if (isNaN(contacted.getTime())) return false;
    const daysSince = (Date.now() - contacted.getTime()) / (1000 * 60 * 60 * 24);
    return daysSince >= RESURFACE_DAYS;
}
function resurfaceLabel(venue) {
    if (!venue.contacted_date) return '';
    const contacted = new Date(venue.contacted_date);
    if (isNaN(contacted.getTime())) return '';
    const years = ((Date.now() - contacted.getTime()) / (1000 * 60 * 60 * 24 * 365.25));
    if (years >= 2) return 'Last contacted ' + Math.round(years) + ' years ago';
    const months = Math.round(years * 12);
    return 'Last contacted ' + months + ' months ago';
}

function venueHasPending(venueId) {
    const contacts = ((dashboardData && dashboardData.contacts) || []).filter(c => c.venue_id === venueId);
    const venue = ((dashboardData && dashboardData.venues) || []).find(v => v.venue_id === venueId);
    if (!venue) return false;
    // Resurfaced venues (contacted 2.5+ years ago) are treated as untouched
    if (isResurfaced(venue)) return true;
    // "contacted" venues still show if they have pending actions (unsent emails, FB, IG)
    // Only fully hide after all outreach is done
    // "researched" = pipeline ran, no emails. Still show if there's FB/IG/contact form to use
    if (venue.status === 'researched') {
        if (venue.instagram && venue.instagram.length > 5) return true;
        if (venue.facebook && venue.facebook.length > 5) return true;
        if (venue.contact_form && venue.contact_form.length > 5) return true;
        return false;
    }
    // Has unsent verified emails?
    if (contacts.some(c => c.email && (c.verified === 'valid' || c.verified === 'catch-all' || c.verified === 'unknown') && !c.email_sent)) return true;
    // Has Instagram not yet DM'd?
    if (venue.instagram && venue.instagram.length > 5 && !contacts.some(c => c.ig_dm_sent)) return true;
    // Has Facebook not yet messaged?
    if (venue.facebook && venue.facebook.length > 5 && !contacts.some(c => c.fb_msg_sent)) return true;
    // Has contact form?
    if (venue.contact_form && venue.contact_form.length > 5) return true;
    return false;
}

function formatDrive(mins) {
    if (!mins) return '';
    if (mins < 60) return mins + ' min';
    const h = Math.floor(mins / 60);
    const m = mins % 60;
    return m > 0 ? h + 'h ' + m + 'm' : h + 'h';
}

function esc(s) {
    if (!s) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// === WEEKLY + DAILY GOALS ===
function getWeekNumber() {
    const now = new Date();
    const day = now.getDay();
    const diff = now.getDate() - day + (day === 0 ? -6 : 1);
    const monday = new Date(now.getFullYear(), now.getMonth(), diff);
    // Week 1 = first Monday after start (~March 17 2026)
    const origin = new Date(2026, 2, 17);
    const weeks = Math.floor((monday - origin) / (7 * 86400000));
    return Math.max(1, weeks + 1);
}

function getGoals() {
    const w = getWeekNumber();
    // Ramp: wk1-2 lower, wk3-4 medium, wk5+ full
    const isFriday = new Date().getDay() === 5;
    if (w <= 2) return {
        weekly: { email: 90, ig: 20, fb: 20 },
        daily: isFriday
            ? { email: 10, ig: 3, fb: 3 }
            : { email: 20, ig: 5, fb: 5 }
    };
    if (w <= 4) return {
        weekly: { email: 135, ig: 35, fb: 35 },
        daily: isFriday
            ? { email: 15, ig: 4, fb: 4 }
            : { email: 30, ig: 7, fb: 7 }
    };
    return {
        weekly: { email: 180, ig: 45, fb: 45 },
        daily: isFriday
            ? { email: 20, ig: 5, fb: 5 }
            : { email: 40, ig: 10, fb: 10 }
    };
}

function renderWeeklyGoals() {
    if (!dashboardData) return;
    const el = document.getElementById('weeklyGoals');
    const goals = getGoals();
    const week = getWeekNumber();
    const wc = dashboardData.weeklyCounts || { email: 0, ig: 0, fb: 0 };
    const dc = dashboardData.dailyCounts || { email: 0, ig: 0, fb: 0 };

    el.style.display = '';
    const bars = [
        { label: 'Email', daily: dc.email, dGoal: goals.daily.email,
          weekly: wc.email, wGoal: goals.weekly.email, cls: 'email' },
        { label: 'IG', daily: dc.ig, dGoal: goals.daily.ig,
          weekly: wc.ig, wGoal: goals.weekly.ig, cls: 'ig' },
        { label: 'FB', daily: dc.fb, dGoal: goals.daily.fb,
          weekly: wc.fb, wGoal: goals.weekly.fb, cls: 'fb' }
    ];

    let html = `<div class="weekly-goals-title">`;
    html += `<span>Week ${week} Outreach</span>`;
    const totalDaily = dc.email + dc.ig + dc.fb;
    const totalWeekly = wc.email + wc.ig + wc.fb;
    html += `<span style="font-size:0.7rem;color:var(--text-dim)">Today: ${totalDaily} · Week: ${totalWeekly}</span>`;
    html += `</div>`;

    for (const b of bars) {
        const wPct = Math.min(100, Math.round((b.weekly / b.wGoal) * 100));
        const wDone = b.weekly >= b.wGoal;
        const dDone = b.daily >= b.dGoal;
        const dayText = dDone
            ? `<span style="color:var(--green)">${b.daily}/${b.dGoal}</span>`
            : `${b.daily}/${b.dGoal}`;
        html += `<div class="weekly-goal-row">`;
        html += `<span class="weekly-goal-label">${b.label}</span>`;
        html += `<div class="weekly-goal-bar"><div class="weekly-goal-fill ${b.cls}" style="width:${wPct}%${wDone ? ';opacity:0.7' : ''}"></div></div>`;
        html += `<span class="weekly-goal-count" style="width:35px;font-size:0.6rem">${dayText}</span>`;
        html += `<span class="weekly-goal-count" style="${wDone ? 'color:var(--green)' : ''}">${b.weekly}/${b.wGoal}</span>`;
        html += `</div>`;
    }
    el.innerHTML = html;
}

// === MAIN LOAD ===
function loadDashboard() {
    if (!API_URL) { renderTopPicks([]); renderStateGrid(); return; }

    jsonpFetch(API_URL, function(err, data) {
        if (!err && data && data.status === 'ok') {
            dashboardData = data;
            renderReviewQueue();
            renderTopPicks(data.topPicks);
            renderStateGrid();
            updateGigsCount();
            loadSmartPicks();
            renderWeeklyGoals();
            checkLinkedInReminder();
            // Deep link: ?venue=VENUE_ID opens detail page
            const urlVenue = new URLSearchParams(window.location.search).get('venue');
            if (urlVenue) { openVenueDetail(urlVenue); history.replaceState(null, '', window.location.pathname); }
        } else {
            console.error('Dashboard load error:', err);
        }
        clearTimeout(refreshTimer);
        refreshTimer = setTimeout(loadDashboard, REFRESH_INTERVAL);
    });
}

// === REVIEW QUEUE (Swipe Cards) ===
let reviewQueue = [];
let reviewIndex = 0;
let reviewTotal = 0;
let reviewDragState = null;

function renderReviewQueue() {
    const venues = (dashboardData && dashboardData.venues) || [];
    const gigs = (dashboardData && dashboardData.gigs) || [];
    const gigVenueIds = new Set(gigs.map(g => g.venue_id).filter(Boolean));
    const stripThe = s => (s||'').toLowerCase().trim().replace(/^the\s+/, '');
    const gigNames = new Set(gigs.map(g => stripThe(g.venue_name)).filter(Boolean));
    reviewQueue = venues.filter(v =>
        (!v.venue_vote || v.venue_vote === '') &&
        v.status === 'untouched' &&
        !gigVenueIds.has(v.venue_id) &&
        !gigNames.has(stripThe(v.name))
    );
    reviewIndex = 0;
    reviewTotal = reviewQueue.length;
    const section = document.getElementById('reviewSection');
    if (reviewQueue.length === 0) {
        section.style.display = 'none';
        return;
    }
    section.style.display = '';
    document.getElementById('reviewCounter').textContent = reviewQueue.length + ' to review';
}

function toggleReviewQueue() {
    const stack = document.getElementById('reviewStack');
    if (stack.style.display === 'none') {
        stack.style.display = '';
        renderReviewCards();
    } else {
        stack.style.display = 'none';
    }
}

function renderReviewCards() {
    const stack = document.getElementById('reviewStack');
    const counter = document.getElementById('reviewCounter');
    const remaining = reviewQueue.length - reviewIndex;
    counter.textContent = remaining + ' to review';

    if (reviewIndex >= reviewQueue.length) {
        stack.innerHTML = '<div class="review-done">All caught up!</div>';
        setTimeout(() => {
            document.getElementById('reviewSection').style.display = 'none';
        }, 2000);
        return;
    }

    // Quick client-side score estimate (mirrors server logic roughly)
    function quickScore(v) {
        let pts = 0;
        // Category: wineries/country clubs/private clubs score higher
        const topCats = ['winery','country_club','private_club','golf_club','yacht_club','resort','hotel'];
        const midCats = ['restaurant','wine_bar','event','wedding_venue','museum','art_gallery'];
        const cat = (v.category || '').toLowerCase().replace(/[\s\/]/g, '_');
        if (topCats.includes(cat)) pts += 40;
        else if (midCats.includes(cat)) pts += 28;
        else pts += 15;
        // Upscale (0-30 pts) — quality matters most
        const up = Number(v.upscale_score) || 3;
        pts += Math.round(Math.max(0, 30 * (1 - Math.abs(up - 5) / 5)));
        // Distance (0-10 pts) — just a tiebreaker, will drive for great gigs
        const d = v.distance_miles != null ? Number(v.distance_miles) : null;
        if (d !== null) {
            if (d <= 80) pts += 10;
            else pts += Math.round(Math.max(0, 10 * (1 - (d - 80) / 70)));
        } else { pts += 5; }
        return Math.min(100, Math.max(0, pts));
    }

    let html = '';
    for (let i = Math.min(reviewIndex + 2, reviewQueue.length - 1); i >= reviewIndex; i--) {
        const v = reviewQueue[i];
        const offset = i - reviewIndex;
        const cls = offset === 0 ? '' : offset === 1 ? 'behind-1' : 'behind-2';
        const cat = (v.category || 'other').toLowerCase().replace(/[\s\/]/g, '_');
        const stars = v.notes ? (v.notes.match(/([\d.]+)★/) || [])[1] || '' : '';
        const reviews = v.notes ? (v.notes.match(/\((\d+) reviews\)/) || [])[1] || '' : '';
        const dist = v.distance_miles != null
            ? Math.round(v.distance_miles) + ' mi'
            : 'distance unknown';
        const drive = v.drive_minutes != null
            ? ' · ' + Math.round(v.drive_minutes) + ' min'
            : '';
        const notesTxt = (v.notes || '').replace(/Google Maps '[^']*'\.\s*/, '').replace(/[\d.]+★ \(\d+ reviews\)\.\s*/, '').replace(/Discovered from:.*/, '').trim();
        const score = quickScore(v);
        const scoreColor = score >= 60 ? 'var(--gold)' : score >= 40 ? 'var(--green)' : 'var(--text-dim)';

        html += `<div class="review-card ${cls}" data-idx="${i}" id="reviewCard${i}">
            <span class="review-swipe-hint left">&#10007;</span>
            <span class="review-swipe-hint right">&#10003;</span>
            <div style="display:flex;justify-content:space-between;align-items:center">
                <div class="review-venue-name" style="margin-bottom:0">${v.name}</div>
                <span style="font-size:0.85rem;font-weight:bold;color:${scoreColor}">${score}</span>
            </div>
            <div class="review-meta">
                <span class="category-badge ${cat}">${cat.replace(/_/g, ' ')}</span>
                ${stars ? `<span class="review-stars">${stars}&#9733; (${reviews})</span>` : ''}
                <span class="review-distance">${dist}${drive}</span>
            </div>
            ${notesTxt ? `<div class="review-notes">${notesTxt}</div>` : ''}
            <div style="display:flex;gap:0.4rem;margin-top:0.5rem;flex-wrap:wrap">
                ${v.website && v.website !== 'undefined' ? `<a href="${v.website}" target="_blank" onclick="event.stopPropagation()" style="font-size:0.7rem;color:var(--gold);background:rgba(240,160,48,0.1);border:1px solid rgba(240,160,48,0.3);border-radius:12px;padding:0.2rem 0.6rem;text-decoration:none">Website</a>` : ''}
                ${v.instagram ? `<a href="${v.instagram}" target="_blank" rel="noopener noreferrer" onclick="event.stopPropagation()" style="font-size:0.7rem;color:#e1306c;background:rgba(225,48,108,0.1);border:1px solid rgba(225,48,108,0.3);border-radius:12px;padding:0.2rem 0.6rem;text-decoration:none">Instagram</a>` : ''}
                ${v.facebook ? `<a href="${v.facebook}" target="_blank" rel="noopener noreferrer" onclick="event.stopPropagation()" style="font-size:0.7rem;color:#4267b2;background:rgba(66,103,178,0.1);border:1px solid rgba(66,103,178,0.3);border-radius:12px;padding:0.2rem 0.6rem;text-decoration:none">Facebook</a>` : ''}
                <a href="https://www.google.com/maps/search/${encodeURIComponent(v.name + ' ' + (v.city || '') + ' ' + (v.state || ''))}" target="_blank" onclick="event.stopPropagation()" style="font-size:0.7rem;color:var(--green);background:rgba(38,166,154,0.1);border:1px solid rgba(38,166,154,0.3);border-radius:12px;padding:0.2rem 0.6rem;text-decoration:none">Maps</a>
            </div>
            <div style="margin-top:0.6rem">
                <input type="text" id="reviewNote${i}" placeholder="Quick note (optional)..."
                    style="width:100%;background:rgba(255,255,255,0.05);border:1px solid var(--border);
                    border-radius:6px;padding:0.4rem 0.6rem;color:var(--text);font-size:0.8rem;
                    font-family:'Lato',sans-serif;outline:none"
                    onfocus="this.parentElement.parentElement.style.cursor='default'"
                    onclick="event.stopPropagation()">
            </div>
            <div class="review-actions">
                <button class="review-btn reject" onclick="reviewDelete(${i})" title="Reject">&#10007;</button>
                <button class="review-btn neutral" onclick="reviewVote('neutral',${i})" title="Indifferent">&mdash;</button>
                <button class="review-btn approve" onclick="reviewVote('up',${i})" title="Approve">&#10003;</button>
            </div>
            <div style="text-align:center;margin-top:0.3rem">
                <a href="#" onclick="event.preventDefault();reviewContacted(${i})" style="color:#888;font-size:0.7rem;font-family:'Lato',sans-serif;text-decoration:none">already contacted</a>
            </div>
        </div>`;
    }
    stack.innerHTML = html;

    // Attach touch/drag to top card
    const topCard = document.getElementById('reviewCard' + reviewIndex);
    if (topCard) initReviewDrag(topCard, reviewIndex);
}

function initReviewDrag(card, idx) {
    let startX = 0, currentX = 0, dragging = false;
    const hintL = card.querySelector('.review-swipe-hint.left');
    const hintR = card.querySelector('.review-swipe-hint.right');

    function onStart(e) {
        if (e.target.tagName === 'INPUT') return;
        const t = e.touches ? e.touches[0] : e;
        startX = t.clientX;
        dragging = true;
        card.classList.add('swiping');
    }
    function onMove(e) {
        if (!dragging) return;
        const t = e.touches ? e.touches[0] : e;
        currentX = t.clientX - startX;
        card.style.transform = `translateX(${currentX}px) rotate(${currentX * 0.08}deg)`;
        if (hintL) hintL.style.opacity = currentX < -30 ? Math.min(1, (-currentX - 30) / 50) : 0;
        if (hintR) hintR.style.opacity = currentX > 30 ? Math.min(1, (currentX - 30) / 50) : 0;
    }
    function onEnd() {
        if (!dragging) return;
        dragging = false;
        card.classList.remove('swiping');
        if (hintL) hintL.style.opacity = 0;
        if (hintR) hintR.style.opacity = 0;
        if (currentX > 80) {
            reviewVote('up', idx);
        } else if (currentX < -80) {
            reviewDelete(idx, true);
        } else {
            card.style.transform = '';
        }
        currentX = 0;
    }

    card.addEventListener('touchstart', onStart, { passive: true });
    card.addEventListener('touchmove', onMove, { passive: true });
    card.addEventListener('touchend', onEnd);
    card.addEventListener('mousedown', onStart);
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onEnd);
}

function reviewVote(vote, idx) {
    const v = reviewQueue[idx];
    if (!v) return;
    const card = document.getElementById('reviewCard' + idx);
    // Save note if provided
    const noteInput = document.getElementById('reviewNote' + idx);
    const note = noteInput ? noteInput.value.trim() : '';
    if (card) {
        const anim = vote === 'up' ? 'swipe-right' : vote === 'neutral' ? 'swipe-up' : 'swipe-left';
        card.classList.add(anim);
    }
    // Save vote
    fireGet(BASE_URL + '?action=update_venue&venue_id=' +
        encodeURIComponent(v.venue_id) +
        '&field=venue_vote&value=' + vote);
    // Save feedback note
    if (note) {
        fireGet(BASE_URL + '?action=update_venue&venue_id=' +
            encodeURIComponent(v.venue_id) +
            '&field=venue_feedback&value=' + encodeURIComponent(note));
    }
    // Update local data
    if (dashboardData) {
        const dv = dashboardData.venues.find(x => x.venue_id === v.venue_id);
        if (dv) { dv.venue_vote = vote; if (note) dv.venue_feedback = note; }
    }
    setTimeout(() => {
        reviewIndex++;
        renderReviewCards();
    }, 400);
}

function reviewDelete(idx, swiped) {
    const v = reviewQueue[idx];
    if (!v) return;
    if (!swiped && !confirm('Delete ' + v.name + '?')) return;
    const card = document.getElementById('reviewCard' + idx);
    if (card && !swiped) card.classList.add('swipe-left');
    fireGet(BASE_URL + '?action=delete_venue&venue_id=' +
        encodeURIComponent(v.venue_id));
    // Remove from local data
    if (dashboardData) {
        dashboardData.venues = dashboardData.venues.filter(
            x => x.venue_id !== v.venue_id
        );
    }
    setTimeout(() => {
        reviewIndex++;
        renderReviewCards();
    }, 400);
}

function reviewContacted(idx) {
    const v = reviewQueue[idx];
    if (!v) return;
    const noteInput = document.getElementById('reviewNote' + idx);
    const note = noteInput ? noteInput.value.trim() : '';
    const card = document.getElementById('reviewCard' + idx);
    if (card) card.classList.add('swipe-up');
    fireGet(BASE_URL + '?action=update_venue&venue_id=' +
        encodeURIComponent(v.venue_id) + '&field=status&value=contacted');
    fireGet(BASE_URL + '?action=update_venue&venue_id=' +
        encodeURIComponent(v.venue_id) + '&field=venue_vote&value=up');
    if (note) {
        fireGet(BASE_URL + '?action=update_venue&venue_id=' +
            encodeURIComponent(v.venue_id) + '&field=venue_feedback&value=' + encodeURIComponent(note));
    }
    if (dashboardData) {
        const dv = dashboardData.venues.find(x => x.venue_id === v.venue_id);

}

// === MONTHLY TASKS ===
const MONTHLY_KEY = 'outreach_monthly_tasks';
const MONTHLY_DEFAULTS_KEY = 'outreach_monthly_defaults';
const BUILTIN_DEFAULTS = [
    { text: 'Send 20 Outreach Emails' },
    { text: 'Scrape 5 New Venues' },
    { text: 'Follow Up With 3 Past Contacts' },
    { text: 'Run Apollo On 3 Venues' },
    { text: 'Send 10 Instagram DMs' },
    { text: 'Send 10 Facebook Messages' }
];

function titleCase(s) { return s.replace(/\b\w/g, c => c.toUpperCase()); }

function getMonthlyDefaults() {
    const stored = localStorage.getItem(MONTHLY_DEFAULTS_KEY);
    if (stored) {
        const parsed = JSON.parse(stored);
        // Migrate old string format to object format
        return parsed.map(d => typeof d === 'string' ? { text: d } : d);
    }
    return BUILTIN_DEFAULTS.map(d => ({ ...d }));
}
function getMonthKey() {
    const d = new Date();
    return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
}

function getMonthlyTasks() {
    const data = JSON.parse(localStorage.getItem(MONTHLY_KEY) || '{}');
    const currentMonth = getMonthKey();
    if (data.month !== currentMonth) {
        // New month — use saved defaults
        const defaults = getMonthlyDefaults();
        const tasks = defaults.map((d, i) => {
            const task = { id: i, text: d.text, done: false };
            if (d.subtasks && d.subtasks.length > 0) {
                task.subtasks = d.subtasks.map((s, j) => ({ id: j + 1, text: s, done: false }));
            }
            return task;
        });
        const fresh = { month: currentMonth, tasks: tasks };
        localStorage.setItem(MONTHLY_KEY, JSON.stringify(fresh));
        return fresh;
    }
    return data;
}

function saveMonthlyTasks(data) {
    localStorage.setItem(MONTHLY_KEY, JSON.stringify(data));
    syncMonthlyToCloud();
}

function saveMonthlyDefaults(arr) { localStorage.setItem(MONTHLY_DEFAULTS_KEY, JSON.stringify(arr)); syncMonthlyToCloud(); }

let _syncTimer = null;
function syncMonthlyToCloud() {
    // Debounce — wait 2s after last change before pushing
    clearTimeout(_syncTimer);
    _syncTimer = setTimeout(() => {
        const tasks = localStorage.getItem(MONTHLY_KEY) || '{}';
        const defaults = localStorage.getItem(MONTHLY_DEFAULTS_KEY) || '[]';
        const url = buildUrl({
            action: 'save_monthly',
            tasks: tasks,
            defaults: defaults
        });
        if (url) jsonpFetch(url, () => {});
    }, 2000);
}

function loadMonthlyFromCloud(cb) {
    const url = buildUrl({ action: 'load_monthly' });
    if (!url) { if (cb) cb(); return; }
    jsonpFetch(url, function(err, data) {
        if (err || !data || data.status !== 'ok') { if (cb) cb(); return; }
        if (data.tasks) {
            try {
                const cloud = JSON.parse(data.tasks);
                const local = JSON.parse(localStorage.getItem(MONTHLY_KEY) || '{}');
                // Cloud wins — overwrite local
                if (cloud.month) {
                    localStorage.setItem(MONTHLY_KEY, data.tasks);
                }
            } catch(e) {}
        }
        if (data.defaults) {
            try {
                const cloudDef = JSON.parse(data.defaults);
                if (Array.isArray(cloudDef) && cloudDef.length > 0) {
                    localStorage.setItem(MONTHLY_DEFAULTS_KEY, data.defaults);
                }
            } catch(e) {}
        }
        renderMonthlyTasks();
        if (cb) cb();
    });
}

function toggleMonthlyTask(id) {
    const data = getMonthlyTasks();
    const task = data.tasks.find(t => t.id === id);
    if (!task) return;
    task.done = !task.done;
    // If parent has subtasks, toggle all subtasks too
    if (task.subtasks && task.subtasks.length > 0) {
        task.subtasks.forEach(s => s.done = task.done);
    }
    saveMonthlyTasks(data);
    renderMonthlyTasks();
}

function toggleMonthlySubtask(parentId, subId) {
    const data = getMonthlyTasks();
    const task = data.tasks.find(t => t.id === parentId);
    if (!task || !task.subtasks) return;
    const sub = task.subtasks.find(s => s.id === subId);
    if (sub) sub.done = !sub.done;
    // Auto-complete parent if all subtasks done
    const allDone = task.subtasks.every(s => s.done);
    const anyDone = task.subtasks.some(s => s.done);
    if (allDone) task.done = true;
    else if (!anyDone) task.done = false;
    else task.done = false;
    saveMonthlyTasks(data);
    renderMonthlyTasks();
}

function addMonthlySubtask(parentId) {
    const text = prompt('New subtask:');
    if (!text || !text.trim()) return;
    const data = getMonthlyTasks();
    const task = data.tasks.find(t => t.id === parentId);
    if (!task) return;
    if (!task.subtasks) task.subtasks = [];
    const maxSubId = task.subtasks.reduce((m, s) => Math.max(m, s.id), 0);
    task.subtasks.push({ id: maxSubId + 1, text: titleCase(text.trim()), done: false });
    saveMonthlyTasks(data);
    renderMonthlyTasks();
}

function editMonthlySubtask(parentId, subId) {
    const data = getMonthlyTasks();
    const task = data.tasks.find(t => t.id === parentId);
    if (!task || !task.subtasks) return;
    const sub = task.subtasks.find(s => s.id === subId);
    if (!sub) return;
    const choice = prompt('Edit subtask (clear to delete):', sub.text);
    if (choice === null) return;
    if (choice.trim() === '') {
        task.subtasks = task.subtasks.filter(s => s.id !== subId);
    } else {
        sub.text = titleCase(choice.trim());
    }
    saveMonthlyTasks(data);
    renderMonthlyTasks();
}

function addMonthlyTask() {
    const text = prompt('New task:');
    if (!text || !text.trim()) return;
    const data = getMonthlyTasks();
    const maxId = data.tasks.reduce((m, t) => Math.max(m, t.id), 0);
    data.tasks.push({ id: maxId + 1, text: titleCase(text.trim()), done: false });
    saveMonthlyTasks(data);
    renderMonthlyTasks();
}

function editMonthlyTask(id) {
    const data = getMonthlyTasks();
    const task = data.tasks.find(t => t.id === id);
    if (!task) return;
    const choice = prompt('Edit task (clear to delete):', task.text);
    if (choice === null) return; // cancelled
    if (choice.trim() === '') {
        // Delete
        data.tasks = data.tasks.filter(t => t.id !== id);
    } else {
        task.text = titleCase(choice.trim());
    }
    saveMonthlyTasks(data);
    renderMonthlyTasks();
}

function removeMonthlyTask(id) {
    const data = getMonthlyTasks();
    data.tasks = data.tasks.filter(t => t.id !== id);
    saveMonthlyTasks(data);
    renderMonthlyTasks();
}

function countMonthlyItems(tasks) {
    let total = 0, done = 0;
    for (const t of tasks) {
        if (t.subtasks && t.subtasks.length > 0) {
            total += t.subtasks.length;
            done += t.subtasks.filter(s => s.done).length;
        } else {
            total++;
            if (t.done) done++;
        }
    }
    return { total, done };
}

function renderMonthlyTasks() {
    // Monthly tasks enabled
    const data = getMonthlyTasks();
    const tasks = data.tasks || [];
    const { total, done: doneCount } = countMonthlyItems(tasks);
    const remaining = total - doneCount;
    const monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const monthLabel = monthNames[new Date().getMonth()] + ' ' + new Date().getFullYear();

    // Flashing pill (shows on mobile, also visible on desktop)
    const pill = document.getElementById('monthlyPill');
    if (remaining > 0) {
        pill.textContent = remaining + ' task' + (remaining !== 1 ? 's' : '');
        pill.style.display = '';
        pill.classList.remove('all-done');
    } else if (tasks.length > 0) {
        pill.textContent = 'All done!';
        pill.style.display = '';
        pill.classList.add('all-done');
    } else {
        pill.style.display = 'none';
    }

    // Full task list (collapsible, starts collapsed)
    const section = document.getElementById('monthlySection');
    const wasOpen = section.querySelector('.monthly-body.open') !== null;
    let html = `<div class="monthly-header${wasOpen ? ' open' : ''}" onclick="toggleMonthlyBody()">`;
    html += `<span class="monthly-title">${monthLabel} Tasks</span>`;
    html += `<span class="monthly-progress">${doneCount}/${tasks.length}</span>`;
    html += `</div>`;
    html += `<div class="monthly-body${wasOpen ? ' open' : ''}">`;
    for (const t of tasks) {
        html += `<div class="monthly-task${t.done ? ' done' : ''}" onclick="toggleMonthlyTask(${t.id})">`;
        html += `<span class="monthly-check">${t.done ? '&#10003;' : ''}</span>`;
        html += `<span class="monthly-task-text">${esc(t.text)}</span>`;
        html += `<span class="monthly-add-sub" onclick="event.stopPropagation();addMonthlySubtask(${t.id})" title="Add subtask">+</span>`;
        html += `<span class="monthly-edit" onclick="event.stopPropagation();editMonthlyTask(${t.id})">&#9998;</span>`;
        html += `</div>`;
        if (t.subtasks && t.subtasks.length > 0) {
            for (const s of t.subtasks) {
                html += `<div class="monthly-subtask${s.done ? ' done' : ''}" onclick="toggleMonthlySubtask(${t.id},${s.id})">`;
                html += `<span class="monthly-check">${s.done ? '&#10003;' : ''}</span>`;
                html += `<span class="monthly-task-text">${esc(s.text)}</span>`;
                html += `<span class="monthly-edit" onclick="event.stopPropagation();editMonthlySubtask(${t.id},${s.id})">&#9998;</span>`;
                html += `</div>`;
            }
        }
    }
    html += `<div class="monthly-add" onclick="event.stopPropagation();addMonthlyTask()">+ Add task</div>`;
    html += `<div class="monthly-add monthly-edit-defaults" onclick="event.stopPropagation();openDefaultsEditor()">&#9881; Edit Monthly Defaults</div>`;
    html += `</div>`;
    section.innerHTML = html;
}

function toggleMonthlyBody() {
    const body = document.querySelector('.monthly-body');
    const header = document.querySelector('.monthly-header');
    if (body) { body.classList.toggle('open'); header.classList.toggle('open'); }

function openDefaultsEditor() {
    const defaults = getMonthlyDefaults();
    const section = document.getElementById('monthlySection');
    const monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const monthLabel = monthNames[new Date().getMonth()] + ' ' + new Date().getFullYear();
    let html = `<div class="monthly-header open" onclick="toggleMonthlyBody()">`;
    html += `<span class="monthly-title">${monthLabel} Tasks</span>`;
    html += `<span class="monthly-progress">Editing Defaults</span>`;
    html += `</div>`;
    html += `<div class="monthly-body open">`;
    html += `<div style="padding:0.3rem 0.5rem;font-size:0.75rem;color:var(--text-dim);margin-bottom:0.3rem">These tasks reset every month. Tap &#9998; to edit, &#10005; to remove.</div>`;
    for (let i = 0; i < defaults.length; i++) {
        const d = defaults[i];
        html += `<div class="monthly-task">`;
        html += `<span class="monthly-task-text" style="flex:1">${esc(d.text)}</span>`;
        html += `<span class="monthly-add-sub" onclick="event.stopPropagation();addDefaultSubtask(${i})">+</span>`;
        html += `<span class="monthly-edit" onclick="event.stopPropagation();editDefault(${i})">&#9998;</span>`;
        html += `<span class="monthly-edit" onclick="event.stopPropagation();removeDefault(${i})" style="color:var(--red)">&#10005;</span>`;
        html += `</div>`;
        if (d.subtasks && d.subtasks.length > 0) {
            for (let j = 0; j < d.subtasks.length; j++) {
                html += `<div class="monthly-subtask">`;
                html += `<span class="monthly-task-text" style="flex:1">${esc(d.subtasks[j])}</span>`;
                html += `<span class="monthly-edit" onclick="event.stopPropagation();editDefaultSubtask(${i},${j})">&#9998;</span>`;
                html += `<span class="monthly-edit" onclick="event.stopPropagation();removeDefaultSubtask(${i},${j})" style="color:var(--red)">&#10005;</span>`;
                html += `</div>`;
            }
        }
    }
    html += `<div class="monthly-add" onclick="event.stopPropagation();addDefault()">+ Add Default Task</div>`;
    html += `<div class="monthly-add" onclick="event.stopPropagation();syncDefaultsToCurrent();renderMonthlyTasks()" style="color:var(--gold)">&#10003; Done</div>`;
    html += `</div>`;
    section.innerHTML = html;
}

function editDefault(idx) {
    const defaults = getMonthlyDefaults();
    const choice = prompt('Edit default task:', defaults[idx].text);
    if (choice === null) return;
    if (choice.trim() === '') { defaults.splice(idx, 1); }
    else { defaults[idx].text = titleCase(choice.trim()); }
    saveMonthlyDefaults(defaults);
    openDefaultsEditor();
}

function removeDefault(idx) {
    const defaults = getMonthlyDefaults();
    defaults.splice(idx, 1);
    saveMonthlyDefaults(defaults);
    openDefaultsEditor();
}

function addDefault() {
    const text = prompt('New default task:');
    if (!text || !text.trim()) return;
    const defaults = getMonthlyDefaults();
    defaults.push({ text: titleCase(text.trim()) });
    saveMonthlyDefaults(defaults);
    openDefaultsEditor();
}

function addDefaultSubtask(idx) {
    const text = prompt('New default subtask:');
    if (!text || !text.trim()) return;
    const defaults = getMonthlyDefaults();
    if (!defaults[idx].subtasks) defaults[idx].subtasks = [];
    defaults[idx].subtasks.push(titleCase(text.trim()));
    saveMonthlyDefaults(defaults);
    openDefaultsEditor();
}

function editDefaultSubtask(idx, subIdx) {
    const defaults = getMonthlyDefaults();
    const choice = prompt('Edit default subtask (clear to delete):', defaults[idx].subtasks[subIdx]);
    if (choice === null) return;
    if (choice.trim() === '') { defaults[idx].subtasks.splice(subIdx, 1); }
    else { defaults[idx].subtasks[subIdx] = titleCase(choice.trim()); }
    saveMonthlyDefaults(defaults);
    openDefaultsEditor();
}

function removeDefaultSubtask(idx, subIdx) {
    const defaults = getMonthlyDefaults();
    defaults[idx].subtasks.splice(subIdx, 1);
    saveMonthlyDefaults(defaults);
    openDefaultsEditor();
}

function syncDefaultsToCurrent() {
    const defaults = getMonthlyDefaults();
    const data = getMonthlyTasks();
    const tasks = data.tasks || [];
    // Rebuild task list from defaults, preserving done state
    const newTasks = defaults.map((d, i) => {
        // Try to find matching existing task by text (case-insensitive)
        const existing = tasks.find(t => t.text.toLowerCase() === d.text.toLowerCase());
        const task = { id: i, text: d.text, done: existing ? existing.done : false };
        if (d.subtasks && d.subtasks.length > 0) {
            const oldSubs = (existing && existing.subtasks) || [];
            task.subtasks = d.subtasks.map((s, j) => {
                const oldSub = oldSubs.find(os => os.text.toLowerCase() === s.toLowerCase());
                return { id: j + 1, text: s, done: oldSub ? oldSub.done : false };
            });
            // Auto-complete parent if all subtasks done
            if (task.subtasks.length > 0 && task.subtasks.every(s => s.done)) task.done = true;
        }
        return task;
    });
    data.tasks = newTasks;
    saveMonthlyTasks(data);
}

function scrollToTasks() {
    const data = getMonthlyTasks();
    const { total, done } = countMonthlyItems(data.tasks || []);
    const remaining = total - done;
    if (remaining > 0) {
        showToast(remaining + ' task' + (remaining !== 1 ? 's' : '') + ' remaining');
    } else {
        showToast('All tasks done this month!');
    }
}

// === PAST GIGS ===
let gigsData = []; // Cached from dashboard

function openGigsView() {
    const body = document.getElementById('gigsBody');
    gigsData = (dashboardData && dashboardData.gigs) || [];

    if (gigsData.length === 0) {
        body.innerHTML = '<div class="gig-empty">No past gigs yet.<br>Tap "+ Add" to log your first gig!</div>';
    } else {
        // Sort by overall score descending (best gigs first)
        const sorted = [...gigsData].sort((a, b) => (b.overall_score || 0) - (a.overall_score || 0));
        body.innerHTML = sorted.map(g => renderGigCard(g)).join('');
    }
    navigateTo('viewGigs');
}

function renderGigCard(g) {
    const scoreColor = g.overall_score >= 8 ? 'var(--green)' : g.overall_score >= 5 ? 'var(--gold)' : 'var(--red)';
    const cat = (g.category || 'other').toLowerCase().replace(/[\s\/]/g, '_');
    const dateStr = g.date ? new Date(g.date + 'T00:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : '';
    let html = `<div class="gig-card" onclick="showEditGigForm('${esc(g.gig_id)}')">`;
    html += `<div class="gig-card-top">`;
    html += `<div><div class="gig-card-name">${esc(g.venue_name)}</div>`;
    html += `<div class="gig-card-date">${dateStr}${g.category ? ' · ' : ''}<span class="category-badge ${cat}">${esc((g.category || '').toUpperCase())}</span></div></div>`;
    html += `<div class="gig-card-score" style="color:${scoreColor}">${g.overall_score.toFixed(1)}</div>`;
    html += `</div>`;
    html += `<div class="gig-card-ratings">`;
    html += `<span class="gig-rating-pill">Tips ${g.rating_tips}</span>`;
    html += `<span class="gig-rating-pill">Rebooked ${g.rating_rebooked}</span>`;
    html += `<span class="gig-rating-pill">Audience ${g.rating_audience}</span>`;
    html += `<span class="gig-rating-pill">Quality ${g.rating_venue_quality}</span>`;
    html += `</div>`;
    if (g.notes) html += `<div class="gig-card-notes">${esc(g.notes)}</div>`;
    html += `</div>`;
    return html;
}

function showAddGigForm() {
    renderGigForm(null);
    navigateTo('viewGigForm');
}

function showEditGigForm(gigId) {
    const gig = gigsData.find(g => g.gig_id === gigId);
    if (!gig) return;
    renderGigForm(gig);
    navigateTo('viewGigForm');
}

function renderGigForm(gig) {
    const isEdit = !!gig;
    document.getElementById('gigFormTitle').textContent = isEdit ? 'Edit Gig' : 'Add Past Gig';
    const body = document.getElementById('gigFormBody');

    // Build venue dropdown from dashboard venues
    const venues = (dashboardData && dashboardData.venues) || [];
    let venueOpts = '<option value="">— Not in system —</option>';
    venues.forEach(v => {
        const sel = (gig && gig.venue_id === v.venue_id) ? ' selected' : '';
        venueOpts += `<option value="${esc(v.venue_id)}" data-cat="${esc(v.category || '')}" data-name="${esc(v.name)}"${sel}>${esc(v.name)} (${esc(v.state || '')})</option>`;
    });

    // Build category dropdown
    const cats = ['winery', 'museum', 'hotel', 'country_club', 'event', 'restaurant', 'wine_bar', 'resort', 'senior_living', 'event_planner', 'golf_club', 'yacht_club', 'art_gallery', 'luxury_apts', 'grocery_market', 'wedding_venue', 'corporate', 'spa', 'private_club', 'church', 'luxury_retail', 'mall'];
    let catOpts = cats.map(c => `<option value="${c}"${gig && gig.category === c ? ' selected' : ''}>${CATEGORY_LABELS[c] || c}</option>`).join('');

    let html = '';
    // Venue select
    html += `<div class="gig-form-field"><label>Venue</label>`;
    html += `<select id="gigVenueSelect" onchange="onGigVenueChange()">`;
    html += venueOpts;
    html += `</select></div>`;

    // Venue name (for venues not in system)
    html += `<div class="gig-form-field" id="gigNameRow"${gig && gig.venue_id ? ' style="display:none"' : ''}>`;
    html += `<label>Venue Name</label>`;
    html += `<input type="text" id="gigVenueName" value="${esc(gig ? gig.venue_name : '')}" placeholder="e.g. The Inn at Perry Cabin"></div>`;

    // Date
    html += `<div class="gig-form-field"><label>Date</label>`;
    html += `<input type="date" id="gigDate" value="${gig ? gig.date : new Date().toISOString().split('T')[0]}"></div>`;

    // Category
    html += `<div class="gig-form-field"><label>Category</label>`;
    html += `<select id="gigCategory">${catOpts}</select></div>`;

    // Rating dots
    const ratingFields = [
        { key: 'tips', label: 'Tips / Pay', val: gig ? gig.rating_tips : 5 },
        { key: 'rebooked', label: 'Rebooked', val: gig ? gig.rating_rebooked : 5 },
        { key: 'audience', label: 'Audience', val: gig ? gig.rating_audience : 5 },
        { key: 'quality', label: 'Quality', val: gig ? gig.rating_venue_quality : 5 }
    ];

    for (const rf of ratingFields) {
        html += `<div class="rating-row">`;
        html += `<span class="rating-label">${rf.label}</span>`;
        html += `<div class="rating-dots" id="dots_${rf.key}">`;
        for (let i = 1; i <= 10; i++) {
            html += `<div class="rating-dot${i <= rf.val ? ' active' : ''}" data-rating="${rf.key}" data-val="${i}" onclick="setRating('${rf.key}',${i})">${i}</div>`;
        }
        html += `</div></div>`;
    }

    // Overall score display
    const overall = gig ? gig.overall_score : 5;
    const overallColor = overall >= 8 ? 'var(--green)' : overall >= 5 ? 'var(--gold)' : 'var(--red)';
    html += `<div class="rating-overall" id="gigOverall" style="color:${overallColor}">${overall.toFixed(1)}</div>`;

    // Notes
    html += `<div class="gig-form-field"><label>Notes</label>`;
    html += `<textarea id="gigNotes" placeholder="What made it good/bad?">${esc(gig ? gig.notes : '')}</textarea></div>`;

    // Save button
    html += `<button class="gig-save-btn" onclick="saveGig('${isEdit ? esc(gig.gig_id) : ''}')">${isEdit ? 'Update Gig' : 'Save Gig'}</button>`;

    // Delete button (edit only)
    if (isEdit) {
        html += `<div style="text-align:center;margin-top:0.75rem">`;
        html += `<button class="gig-delete-btn" onclick="deleteGig('${esc(gig.gig_id)}')">Delete Gig</button>`;
        html += `</div>`;
    }

    body.innerHTML = html;
}

function onGigVenueChange() {
    const sel = document.getElementById('gigVenueSelect');
    const nameRow = document.getElementById('gigNameRow');
    const opt = sel.options[sel.selectedIndex];
    if (sel.value) {
        nameRow.style.display = 'none';
        document.getElementById('gigVenueName').value = opt.getAttribute('data-name') || '';
        // Auto-set category from venue
        const vCat = (opt.getAttribute('data-cat') || '').toLowerCase().replace(/[\s\/]/g, '_');
        if (vCat) document.getElementById('gigCategory').value = vCat;
    } else {
        nameRow.style.display = '';
    }
}

function setRating(key, val) {
    const dots = document.querySelectorAll(`#dots_${key} .rating-dot`);
    dots.forEach(d => {
        const dv = parseInt(d.getAttribute('data-val'));
        if (dv <= val) d.classList.add('active');
        else d.classList.remove('active');
    });
    updateOverall();
}

function getRating(key) {
    const dots = document.querySelectorAll(`#dots_${key} .rating-dot.active`);
    return dots.length || 5;
}

function updateOverall() {
    const tips = getRating('tips');
    const rebooked = getRating('rebooked');
    const audience = getRating('audience');
    const quality = getRating('quality');
    const avg = (tips + rebooked + audience + quality) / 4;
    const el = document.getElementById('gigOverall');
    if (el) {
        el.textContent = avg.toFixed(1);
        el.style.color = avg >= 8 ? 'var(--green)' : avg >= 5 ? 'var(--gold)' : 'var(--red)';
    }
}

function saveGig(gigId) {
    const venueId = document.getElementById('gigVenueSelect').value || '';
    const venueName = venueId ? document.getElementById('gigVenueSelect').options[document.getElementById('gigVenueSelect').selectedIndex].getAttribute('data-name') : document.getElementById('gigVenueName').value.trim();
    const date = document.getElementById('gigDate').value;
    const category = document.getElementById('gigCategory').value;
    const notes = document.getElementById('gigNotes').value.trim();
    const tips = getRating('tips');
    const rebooked = getRating('rebooked');
    const audience = getRating('audience');
    const quality = getRating('quality');

    if (!venueName) { showToast('Enter a venue name'); return; }

    const params = {
        action: gigId ? 'update_gig' : 'add_gig',
        venue_name: venueName,
        venue_id: venueId,
        date: date,
        category: category,
        rating_tips: tips,
        rating_rebooked: rebooked,
        rating_audience: audience,
        rating_venue_quality: quality,
        notes: notes
    };
    if (gigId) params.gig_id = gigId;

    showToast('Saving...');
    fireGet(buildUrl(params), function(resp) {
        if (resp.status === 'ok') {
            showToast(gigId ? 'Gig updated!' : 'Gig saved!');
            goBack();
            setTimeout(loadDashboard, 500);
        } else {
            showToast('Error: ' + (resp.message || 'Unknown'));
        }
    });
}

function deleteGig(gigId) {
    if (!confirm('Delete this gig?')) return;
    // Use update_gig with a special flag — or we add a delete_gig action
    // For now, just mark as deleted by clearing the venue_name
    showToast('Deleting...');
    fireGet(buildUrl({ action: 'update_gig', gig_id: gigId, venue_name: '(DELETED)' }), function(resp) {
        showToast('Deleted');
        goBack();
        setTimeout(loadDashboard, 500);
    });
}

// === SMART PICKS (Recommendation Engine) ===
let smartPicksData = null;
let allSmartPicks = [];

function toggleSmartPicks() {
    const list = document.getElementById('smartPicksList');
    list.classList.toggle('collapsed');
}

function loadSmartPicks() {
    // Only load if we have past gigs
    const gigs = (dashboardData && dashboardData.gigs) || [];
    if (gigs.length === 0) {
        document.getElementById('smartPicksSection').style.display = 'none';
        return;
    }

    jsonpFetch(buildUrl({ action: 'get_recommendations' }), function(err, data) {
        if (err || !data || data.status !== 'ok') return;
        smartPicksData = data;
        renderSmartPicks(data.recommendations || [], data.profile || {});
    });
}

function renderSmartPicks(recs, profile) {
    const section = document.getElementById('smartPicksSection');
    const list = document.getElementById('smartPicksList');
    const badge = document.getElementById('smartPicksBadge');

    // Exclude past gig venues — you already play there
    const gigVenueIds = new Set(((dashboardData && dashboardData.gigs) || []).map(g => g.venue_id).filter(Boolean));
    const stripThe = s => s.toLowerCase().trim().replace(/^the\s+/, '');
    const gigNames = new Set(((dashboardData && dashboardData.gigs) || []).map(g => stripThe(g.venue_name)).filter(Boolean));
    // Show top 8 recommendations that aren't past gigs or already contacted
    const allFiltered = recs.filter(r => {
        if (gigVenueIds.has(r.venue_id)) return false;
        if (gigNames.has(stripThe(r.name))) return false;
        const v = ((dashboardData && dashboardData.venues) || []).find(v => v.venue_id === r.venue_id);
        if (v && v.status === 'pipelined') return false;
        if (v && v.status === 'contacted' && !isResurfaced(v)) return false;
        return true;
    });
    const filtered = allFiltered.slice(0, 8);

    if (allFiltered.length === 0) {
        section.style.display = 'none';
        return;
    }

    section.style.display = '';
    badge.textContent = allFiltered.length;
    allSmartPicks = allFiltered;

    // Build "why" reason for each pick
    const gigs = (dashboardData && dashboardData.gigs) || [];
    const bestCat = profile.best_category || '';

    list.innerHTML = filtered.map(r => {
        const score = r.recommendation_score;
        const scoreColor = score >= 70 ? 'var(--gold)' : score >= 40 ? 'var(--text)' : 'var(--text-dim)';
        const cat = (r.category || 'other').toLowerCase().replace(/[\s\/]/g, '_');
        const bd = r.score_breakdown || {};

        // Build reason string
        let reasons = [];
        if (bd.category >= 20 && bestCat) {
            // Find best gig in this category
            const catGigs = gigs.filter(g => g.category.toLowerCase() === r.category.toLowerCase());
            if (catGigs.length > 0) {
                const best = catGigs.reduce((a, b) => a.overall_score > b.overall_score ? a : b);
                reasons.push(`${CATEGORY_LABELS[cat] || r.category} scored ${best.overall_score.toFixed(1)}/10 at ${best.venue_name}`);
            } else {
                reasons.push(`Similar to your top category: ${bestCat}`);
            }
        }
        if (bd.zone >= 7) reasons.push('Great zone');
        if (bd.distance >= 18) reasons.push('Ideal distance');
        if (bd.contact_quality >= 7) reasons.push('Good contacts');

        let html = `<div class="smart-pick-card" onclick="openVenueDetail('${esc(r.venue_id)}')">`;
        html += `<div class="smart-pick-top">`;
        html += `<div class="smart-pick-score" style="color:${scoreColor}">${score}</div>`;
        html += `<div class="smart-pick-info">`;
        html += `<div class="smart-pick-name">${esc(r.name)}</div>`;
        html += `<div class="smart-pick-meta"><span class="category-badge ${cat}">${esc((r.category || '').toUpperCase())}</span> ${esc(r.city || '')}${r.state ? ', ' + esc(r.state) : ''}${r.distance_miles ? ' · ' + r.distance_miles + ' mi' : ''}</div>`;
        html += `</div></div>`;
        const spVenue = ((dashboardData && dashboardData.venues) || []).find(v => v.venue_id === r.venue_id);
        if (spVenue && isResurfaced(spVenue)) {
            html += `<div class="smart-pick-reason" style="color:#e8944c">${esc(resurfaceLabel(spVenue))}</div>`;
        } else if (reasons.length > 0) {
            html += `<div class="smart-pick-reason">${esc(reasons[0])}</div>`;
        }
        html += `</div>`;
        return html;
    }).join('');
    if (allFiltered.length > 8) {
        list.innerHTML += `<div style="text-align:center;margin:0.5rem 0"><button onclick="openAllSmartPicks()" style="background:var(--gold);color:#111;border:none;border-radius:6px;padding:0.4rem 1.2rem;font-family:'Lato',sans-serif;font-weight:700;font-size:0.75rem;cursor:pointer">View All ${allFiltered.length} Picks</button></div>`;
    }
}

function openAllSmartPicks() {
    const gigs = (dashboardData && dashboardData.gigs) || [];
    const profile = (smartPicksData && smartPicksData.profile) || {};
    const bestCat = profile.best_category || '';
    let rows = allSmartPicks.map((r, i) => {
        const score = r.recommendation_score;
        const cat = (r.category || 'other').toLowerCase().replace(/[\s\/]/g, '_');
        const bd = r.score_breakdown || {};
        let reason = '';
        if (bd.category >= 20 && bestCat) {
            const catGigs = gigs.filter(g => g.category.toLowerCase() === r.category.toLowerCase());
            if (catGigs.length > 0) {
                const best = catGigs.reduce((a, b) => a.overall_score > b.overall_score ? a : b);
                reason = `${CATEGORY_LABELS[cat] || r.category} scored ${best.overall_score.toFixed(1)}/10 at ${best.venue_name}`;
            }
        }
        const scoreColor = score >= 70 ? '#f0a030' : score >= 40 ? '#e0e0e0' : '#888';
        const catColors = {winery:'#9b59b6',museum:'#3498db',hotel:'#e67e22',country_club:'#27ae60',event:'#e74c3c',restaurant:'#f39c12',wine_bar:'#8e44ad',resort:'#16a085',senior_living:'#2980b9',event_planner:'#c0392b',golf_club:'#2ecc71',yacht_club:'#1abc9c',art_gallery:'#e056a0',luxury_apts:'#8e7cc3',grocery_market:'#6aa84f',wedding_venue:'#d4a5a5',corporate:'#4a86c8',spa:'#76c7c0',private_club:'#b45f06',church:'#674ea7',luxury_retail:'#a64d79',mall:'#cc0000'};
        const catColor = catColors[cat] || '#666';
        return `<tr>
            <td style="color:${scoreColor};font-weight:700;font-size:1.1rem;text-align:center">${score}</td>
            <td><strong>${r.name}</strong><br><span style="font-size:0.7rem;background:${catColor};padding:1px 6px;border-radius:3px;color:#fff">${(r.category||'').toUpperCase()}</span> <span style="color:#888;font-size:0.75rem">${r.city||''}${r.state?', '+r.state:''}</span></td>
            <td style="text-align:center;color:#888">${r.distance_miles ? r.distance_miles+' mi' : '—'}</td>
            <td style="text-align:center">${r.contact_count||0}</td>
            <td style="color:#f0a030;font-size:0.7rem;font-style:italic">${reason}</td>
        </tr>`;
    }).join('');
    const w = window.open('', '_blank');
    w.document.write(`<!DOCTYPE html><html><head><title>All Smart Picks</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
body{background:#0a0a0a;color:#e0e0e0;font-family:'Lato',sans-serif;padding:1.5rem;margin:0}
h1{font-family:'Cinzel',serif;color:#f0a030;margin-bottom:1rem;font-size:1.4rem}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:0.5rem;border-bottom:2px solid #333;color:#888;font-size:0.7rem;text-transform:uppercase}
td{padding:0.5rem;border-bottom:1px solid #1a1a1a;vertical-align:top}
tr:hover{background:rgba(240,160,48,0.05)}
</style></head><body>
<h1>Smart Picks — All ${allSmartPicks.length} Venues</h1>
<table><thead><tr><th>Score</th><th>Venue</th><th>Distance</th><th>Contacts</th><th>Why</th></tr></thead>
<tbody>${rows}</tbody></table></body></html>`);
    w.document.close();
}

    const gigs = (dashboardData && dashboardData.gigs) || [];

    const active = gigs.filter(g => g.venue_name !== '(DELETED)');
