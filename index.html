<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <title>Gig Outreach</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Great+Vibes&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
:root {
    --bg-dark: rgba(10,10,10,0.85);
    --bg-card: rgba(17,17,17,0.9);
    --bg-card-hover: rgba(26,26,26,0.9);
    --border: #222;
    --border-light: #333;
    --text: #e0e0e0;
    --text-dim: #888;
    --text-bright: #fff;
    --accent: #f0a030;
    --accent-dim: #c08020;
    --green: #26a69a;
    --red: #ef5350;
    --gold: #f0a030;
    --zone-green: #26a69a;
    --zone-yellow: #f0c030;
    --zone-default: #666;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: 'Lato', sans-serif;
    background: #000;
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
}

#bgLayer {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: url('4angel.jpg') center/cover no-repeat;
    filter: brightness(0.85) saturate(1.3);
    z-index: -1;
}

/* === VIEW SYSTEM === */
.view {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    z-index: 1;
}
.view.active { display: block; }

.view-inner {
    max-width: 600px;
    margin: 0 auto;
    padding: 1rem;
}

/* === VIEW HEADER (back + title) === */
.view-header {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.75rem 1rem;
    border-bottom: 1px solid var(--border);
    background: rgba(10,10,10,0.9);
    position: sticky;
    top: 0;
    z-index: 10;
}

.view-back {
    font-size: 1.4rem;
    color: var(--accent);
    cursor: pointer;
    background: none;
    border: none;
    padding: 0.25rem;
    -webkit-tap-highlight-color: transparent;
    flex-shrink: 0;
}

.view-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.2rem;
    font-weight: 700;
    color: var(--text-bright);
    flex: 1;
    letter-spacing: 1px;
}

/* === HOME HEADER === */
.home-header {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem 0;
    border-bottom: 1px solid var(--border);
    margin-bottom: 1rem;
}

.home-header h1 {
    font-family: 'Cinzel', serif;
    font-size: 1.8rem;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 4px;
    text-transform: uppercase;
    text-shadow: 0 0 20px rgba(240,160,48,0.4), 0 2px 4px rgba(0,0,0,0.5);
}
.home-header h1 .drop-cap {
    font-family: 'Great Vibes', cursive;
    font-size: 3.2rem;
    font-weight: 400;
    text-transform: none;
    line-height: 0.8;
    margin-right: -2px;
}

/* === SECTIONS === */
.section { margin-bottom: 1.5rem; }

.section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--border);
    margin-bottom: 0.75rem;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
}

.section-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    color: var(--text-bright);
}

.section-badge {
    background: var(--accent);
    color: #000;
    font-size: 0.65rem;
    font-weight: 700;
    padding: 0.15rem 0.5rem;
    border-radius: 10px;
}

/* === VENUE CARDS (Top Picks) === */
.venue-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 0.5rem;
    overflow: hidden;
}

.venue-card[data-zone="green"] { border-left: 3px solid var(--zone-green); }
.venue-card[data-zone="yellow"] { border-left: 3px solid var(--zone-yellow); }

.venue-header {
    display: flex;
    align-items: center;
    padding: 0.75rem;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
}

.venue-header-left { flex: 1; min-width: 0; }

.venue-top {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-bottom: 0.25rem;
    flex-wrap: wrap;
}

.venue-name { font-weight: 700; font-size: 0.85rem; color: var(--text-bright); }

.venue-action-count {
    font-size: 0.6rem; font-weight: 700;
    background: var(--accent); color: #000;
    padding: 0.15rem 0.45rem; border-radius: 10px;
    margin-left: auto; flex-shrink: 0;
}

.venue-chevron {
    color: var(--text-dim); font-size: 0.8rem;
    margin-left: 0.5rem; transition: transform 0.2s; flex-shrink: 0;
}
.venue-card.expanded .venue-chevron { transform: rotate(90deg); }

.venue-details { display: none; padding: 0 0.75rem 0.75rem; }
.venue-card.expanded .venue-details { display: block; }

.venue-city { font-size: 0.7rem; color: var(--text-dim); }

/* === BADGES === */
.category-badge {
    font-size: 0.55rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: 1px; padding: 0.1rem 0.4rem; border-radius: 4px; color: #000;
}
.category-badge.winery { background: #9b59b6; color: #fff; }
.category-badge.museum { background: #3498db; color: #fff; }
.category-badge.hotel { background: #e67e22; color: #fff; }
.category-badge.country_club { background: #27ae60; color: #fff; }
.category-badge.event { background: #e74c3c; color: #fff; }
.category-badge.restaurant { background: #f39c12; color: #000; }

.zone-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
.zone-dot.green { background: var(--zone-green); }
.zone-dot.yellow { background: var(--zone-yellow); }

/* === ACTION ROWS === */
.action-row {
    display: flex; align-items: center; gap: 0.4rem;
    padding: 0.35rem 0; border-top: 1px solid var(--border); flex-wrap: wrap;
}

.contact-email {
    font-size: 0.7rem; color: var(--accent); flex: 1; min-width: 0;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}

.social-label { font-size: 0.7rem; color: var(--text-dim); flex: 1; }

.btn-action {
    font-family: inherit; font-size: 0.6rem; font-weight: 700;
    padding: 0.25rem 0.5rem; border-radius: 5px;
    border: 1px solid var(--border); cursor: pointer; transition: all 0.15s;
}

.btn-copy { background: var(--bg-card); color: var(--accent); border-color: var(--accent-dim); }
.btn-copy:active { background: var(--accent); color: #000; }

.btn-gmail {
    display: inline-block; background: var(--bg-card); color: var(--green);
    border: 1px solid var(--green); text-decoration: none;
    font-family: inherit; font-size: 0.6rem; font-weight: 700;
    padding: 0.25rem 0.5rem; border-radius: 5px;
}

.btn-open { background: var(--bg-card); color: #3498db; border-color: #3498db; }

.btn-sent { background: var(--bg-card); color: var(--green); border-color: var(--green); }
.btn-sent:active { background: var(--green); color: #000; }
.btn-sent.done { background: var(--green); color: #000; opacity: 0.5; pointer-events: none; }

/* === DETAIL VIEW === */
.detail-meta {
    font-size: 0.75rem; color: var(--text-dim); margin-bottom: 1rem;
    display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap;
}

.detail-section-label {
    font-family: 'Playfair Display', serif; font-size: 0.85rem;
    color: var(--text-bright); padding-bottom: 0.35rem;
    border-bottom: 1px solid var(--border); margin: 1.25rem 0 0.5rem;
}

.detail-website {
    display: inline-block; font-size: 0.7rem; color: var(--accent);
    text-decoration: none; word-break: break-all;
}

.detail-action-row {
    display: flex; align-items: center; gap: 0.4rem;
    padding: 0.6rem 0; border-bottom: 1px solid var(--border); flex-wrap: wrap;
}
.detail-action-row:last-child { border-bottom: none; }

.detail-email {
    font-size: 0.8rem; color: var(--accent); flex: 1; min-width: 0;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}

.detail-contact-name { font-size: 0.7rem; color: var(--text-dim); margin-bottom: 0.2rem; }
.detail-social-label { font-size: 0.8rem; color: var(--text); flex: 1; }
.detail-done { font-size: 0.7rem; color: var(--green); font-weight: 700; }

/* === STATE CARDS GRID === */
.state-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; }

.state-card {
    border: 1px solid var(--border); border-radius: 10px;
    padding: 2.5rem 1rem 1rem; text-align: center; cursor: pointer;
    -webkit-tap-highlight-color: transparent; position: relative;
    overflow: hidden; background-size: cover; background-position: center;
}
.state-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background: linear-gradient(to bottom, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.75) 100%);
    border-radius: 10px;
}
.state-card:active { border-color: var(--accent-dim); }

.state-card-name {
    font-family: 'Playfair Display', serif; font-size: 1.2rem;
    color: var(--text-bright); margin-bottom: 0.2rem; position: relative;
    text-shadow: 0 2px 8px rgba(0,0,0,0.7);
}

.state-card-count {
    font-size: 0.65rem; color: #ccc; position: relative;
    text-shadow: 0 1px 4px rgba(0,0,0,0.7);
}

/* === CATEGORY CARDS === */
.category-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }

.category-card {
    position: relative; border-radius: 12px; overflow: hidden; cursor: pointer;
    height: 120px; background-size: cover; background-position: center;
    display: flex; align-items: flex-end; -webkit-tap-highlight-color: transparent;
}
.category-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.15) 60%);
}
.category-card:active::before { background: rgba(0,0,0,0.5); }

.category-card-name {
    position: relative; font-family: 'Playfair Display', serif;
    font-size: 1rem; font-weight: 700; color: #fff; padding: 0.75rem;
    text-shadow: 0 1px 4px rgba(0,0,0,0.7);
}

.category-card-count {
    position: absolute; top: 0.5rem; right: 0.5rem;
    background: var(--accent); color: #000; font-size: 0.65rem;
    font-weight: 700; padding: 0.15rem 0.4rem; border-radius: 10px;
}

/* === VENUE LIST ITEMS === */
.venue-list-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0.75rem; background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 8px; margin-bottom: 0.5rem; cursor: pointer;
}
.venue-list-item:active { background: var(--bg-card-hover); }

.venue-list-name { font-size: 0.8rem; font-weight: 700; color: var(--text-bright); }
.venue-list-city { font-size: 0.65rem; color: var(--text-dim); }

.status-pill {
    font-size: 0.55rem; font-weight: 700; padding: 0.15rem 0.4rem;
    border-radius: 4px; text-transform: uppercase;
}
.status-pill.untouched { background: #333; color: #888; }
.status-pill.in_progress { background: #2a2a00; color: var(--gold); }
.status-pill.contacted { background: #002a2a; color: var(--green); }

/* === TOAST === */
.toast {
    position: fixed; bottom: 2rem; left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--accent); color: #000; font-weight: 700;
    font-size: 0.75rem; padding: 0.5rem 1.5rem; border-radius: 20px;
    z-index: 999; transition: transform 0.3s ease; pointer-events: none;
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* === EMPTY STATE === */
.empty-state { text-align: center; padding: 2rem; color: var(--text-dim); font-size: 0.8rem; }

.collapsed { display: none; }

@media (max-width: 768px) {
    .view-inner { padding: 0.75rem; }
    .home-header h1 { font-size: 1.4rem; letter-spacing: 3px; }
    .home-header h1 .drop-cap { font-size: 2.6rem; }
    .venue-name { font-size: 0.8rem; }
}
</style>
</head>
<body>
<div id="bgLayer"></div>

<!-- ============ VIEW: HOME ============ -->
<div class="view active" id="viewHome">
    <div class="view-inner">
        <div class="home-header">
            <h1><span class="drop-cap">G</span>ig <span class="drop-cap">O</span>utreach</h1>
        </div>

        <!-- TOP PICKS -->
        <div class="section">
            <div class="section-header" onclick="toggleTopPicks()">
                <span class="section-title">Top Picks</span>
                <span class="section-badge" id="topPicksBadge">0</span>
            </div>
            <div id="topPicksList" class="collapsed"></div>
        </div>

        <!-- BROWSE VENUES -->
        <div class="section" id="browseSection">
            <div class="section-header" style="cursor:default">
                <span class="section-title">Browse Venues</span>
            </div>
            <div id="stateGrid"></div>
        </div>
    </div>
</div>

<!-- ============ VIEW: STATE (categories) ============ -->
<div class="view" id="viewState">
    <div class="view-header">
        <button class="view-back" onclick="goBack()">&larr;</button>
        <span class="view-title" id="stateTitleText"></span>
    </div>
    <div class="view-inner" id="stateBody"></div>
</div>

<!-- ============ VIEW: CATEGORY (venue list) ============ -->
<div class="view" id="viewCategory">
    <div class="view-header">
        <button class="view-back" onclick="goBack()">&larr;</button>
        <span class="view-title" id="categoryTitleText"></span>
    </div>
    <div class="view-inner" id="categoryBody"></div>
</div>

<!-- ============ VIEW: VENUE DETAIL ============ -->
<div class="view" id="viewDetail">
    <div class="view-header">
        <button class="view-back" onclick="goBack()">&larr;</button>
        <span class="view-title" id="detailTitleText"></span>
    </div>
    <div class="view-inner" id="detailBody"></div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// === CONFIG ===
const API_URL = 'https://script.google.com/macros/s/AKfycbxlZsGnG_pZG27FJjI8A_CWI5PZ1qs5tlyt2FbqlzfTm5sEvdQjStRDoobOkMOWzyBT/exec?action=dashboard';
const BASE_URL = 'https://script.google.com/macros/s/AKfycbxlZsGnG_pZG27FJjI8A_CWI5PZ1qs5tlyt2FbqlzfTm5sEvdQjStRDoobOkMOWzyBT/exec';
const REFRESH_INTERVAL = 60000;

// === STATE ===
let dashboardData = null;
let refreshTimer = null;
let navStack = ['viewHome'];
let currentState = '';
let currentCategory = '';

// === NAVIGATION ===
function showView(viewId) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById(viewId).classList.add('active');
    // Scroll to top
    document.getElementById(viewId).scrollTop = 0;
}

function navigateTo(viewId) {
    navStack.push(viewId);
    showView(viewId);
    history.pushState({ stack: [...navStack] }, '');
}

function goBack() {
    if (navStack.length <= 1) return;
    navStack.pop();
    showView(navStack[navStack.length - 1]);
    history.pushState({ stack: [...navStack] }, '');
}

window.addEventListener('popstate', function(e) {
    if (navStack.length > 1) {
        navStack.pop();
        showView(navStack[navStack.length - 1]);
    }
});

// === TEMPLATES ===
const DEFAULT_BODY = "Hi I'm a Baltimore based Classical Guitarist and I want to perform at your VENUE_TYPE!\n\nI have performed around the World at\n- The Copacabana Palace(Brazil)\n- Cadogan Hotel (London)\n- The Lake of Meneith Hotel (Scotland)\n- National Museum (Colombia)\n\nAnd Locally at\n- L'Auberge Chez Francois\n- The Inn at Perry Cabin\n- The Maryland Club\n- The Army Navy Country Club\n- The River Bend Country Club\n\nhttps://www.youtube.com/playlist?list=PLLzvJg19fOZ-MQ9HMUHnZ6UyPwsfQStPH\n\nYou can reach me at alexbarnettclassical@gmail.com or 410-794-6204\n\nI look forward to hearing from you!\n\nBest,\nAlexander Barnett";

const TEMPLATES = {
    winery:      { subject: "Classical Guitarist (Spanish/Brazilian Music) to Perform at your Winery!", label: "Winery" },
    museum:      { subject: "Classical Guitarist (Spanish/Brazilian Music) to Perform at your Museum!", label: "Museum" },
    hotel:       { subject: "Classical Guitarist (Spanish/Brazilian Music) to Perform at your Hotel!", label: "Hotel" },
    country_club:{ subject: "Classical Guitarist (Spanish/Brazilian Music) to Perform at your Club!", label: "Country Club" },
    event:       { subject: "Classical Guitarist (Spanish/Brazilian Music) for your Events!", label: "Event" },
    restaurant:  { subject: "Classical Guitarist (Spanish/Brazilian Music) to Perform at your Restaurant!", label: "Restaurant" }
};

function getTemplate(category) {
    const t = TEMPLATES[category] || TEMPLATES.winery;
    return { subject: t.subject, body: DEFAULT_BODY.replace('VENUE_TYPE', t.label || 'Venue') };
}

// === CONSTANTS ===
const STATE_NAMES = { MD: 'Maryland', VA: 'Virginia', DC: 'Washington DC', WV: 'West Virginia', PA: 'Pennsylvania', DE: 'Delaware' };
const CATEGORY_LABELS = { winery: 'Wineries', museum: 'Museums', hotel: 'Hotels', country_club: 'Country Clubs', event: 'Events', restaurant: 'Restaurants' };

const STATE_IMAGES = {
    MD: 'https://images.unsplash.com/photo-1569761316261-9a8696fa2ca3?w=400&q=80',
    VA: 'https://images.unsplash.com/photo-1472396961693-142e6e269027?w=400&q=80',
    DC: 'https://images.unsplash.com/photo-1501466044931-62695aada8e9?w=400&q=80',
    WV: 'https://images.unsplash.com/photo-1508193638397-1c4234db14d8?w=400&q=80',
    PA: 'https://images.unsplash.com/photo-1569974507005-6dc61f97fb5c?w=400&q=80',
    DE: 'https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=400&q=80'
};

const CATEGORY_IMAGES = {
    winery: 'https://images.unsplash.com/photo-1510812431401-41d2bd2722f3?w=400&h=250&fit=crop',
    restaurant: 'https://images.unsplash.com/photo-1414235077428-338989a2e8c0?w=400&h=250&fit=crop',
    hotel: 'https://images.unsplash.com/photo-1566073771259-6a8506099945?w=400&h=250&fit=crop',
    museum: 'https://images.unsplash.com/photo-1554907984-15263bfd63bd?w=400&h=250&fit=crop',
    country_club: 'https://images.unsplash.com/photo-1587174486073-ae5e5cff23aa?w=400&h=250&fit=crop',
    event: 'https://images.unsplash.com/photo-1519167758481-83f550bb49b3?w=400&h=250&fit=crop'
};

// === API HELPERS ===
async function fireGet(url) {
    try {
        const resp = await fetch(url);
        const data = await resp.json();
        if (data.status === 'error') { showToast('Error: ' + data.message); }
        return data;
    } catch(e) {
        showToast('Network error');
        return { status: 'error', message: e.message };
    }
}

function buildUrl(params) {
    if (!BASE_URL) return '';
    const url = new URL(BASE_URL);
    for (const [k, v] of Object.entries(params)) {
        if (v !== '' && v != null) url.searchParams.set(k, v);
    }
    return url.toString();
}

// === CLIPBOARD + TOAST ===
function copyText(text) {
    navigator.clipboard.writeText(text).then(() => showToast('Copied!')).catch(() => {
        const ta = document.createElement('textarea');
        ta.value = text; document.body.appendChild(ta); ta.select();
        document.execCommand('copy'); document.body.removeChild(ta); showToast('Copied!');
    });
}

let toastTimer = null;
function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 1500);
}

// === GMAIL LINK ===
function buildGmailLink(email, category) {
    const t = getTemplate(category);
    return `https://mail.google.com/mail/?view=cm&to=${encodeURIComponent(email)}&su=${encodeURIComponent(t.subject)}&body=${encodeURIComponent(t.body)}`;
}

// === SOCIAL ACTIONS ===
function openIGWithTemplate(igUrl, category) {
    copyText(getTemplate(category).body);
    window.open(igUrl, '_blank');
}

function openFBWithTemplate(fbUrl, category) {
    copyText(getTemplate(category).body);
    window.open(fbUrl, '_blank');
}

// === MARK ACTIONS ===
async function markEmailSent(contactId, venueId, category, btn) {
    if (!BASE_URL) { showToast('API not configured'); return; }
    btn.textContent = '...';
    await fireGet(buildUrl({ action: 'update_contact', contact_id: contactId, field: 'email_sent', value: 'true' }));
    await fireGet(buildUrl({ action: 'log_outreach', venue_id: venueId, contact_id: contactId, channel: 'email', template_used: category }));
    btn.textContent = 'Done'; btn.classList.add('done');
    showToast('Marked as sent!');
    setTimeout(loadDashboard, 1500);
}

async function markIGSent(contactId, venueId, btn) {
    if (!BASE_URL) { showToast('API not configured'); return; }
    btn.textContent = '...';
    await fireGet(buildUrl({ action: 'update_contact', contact_id: contactId, field: 'ig_dm_sent', value: 'true' }));
    await fireGet(buildUrl({ action: 'log_outreach', venue_id: venueId, contact_id: contactId, channel: 'instagram' }));
    btn.textContent = 'Done'; btn.classList.add('done');
    showToast('IG DM marked!');
    setTimeout(loadDashboard, 1500);
}

async function markFBSent(contactId, venueId, btn) {
    if (!BASE_URL) { showToast('API not configured'); return; }
    btn.textContent = '...';
    await fireGet(buildUrl({ action: 'update_contact', contact_id: contactId, field: 'fb_msg_sent', value: 'true' }));
    await fireGet(buildUrl({ action: 'log_outreach', venue_id: venueId, contact_id: contactId, channel: 'facebook' }));
    btn.textContent = 'Done'; btn.classList.add('done');
    showToast('FB msg marked!');
    setTimeout(loadDashboard, 1500);
}

// === RENDER: HOME — Top Picks ===
function toggleTopPicks() {
    const list = document.getElementById('topPicksList');
    const browse = document.getElementById('browseSection');
    list.classList.toggle('collapsed');
    browse.style.display = list.classList.contains('collapsed') ? '' : 'none';
}

function renderTopPicks(picks) {
    const el = document.getElementById('topPicksList');
    const badge = document.getElementById('topPicksBadge');
    const top5 = (picks || []).slice(0, 5);
    badge.textContent = top5.length;

    if (top5.length === 0) {
        el.innerHTML = '<div class="empty-state">No top picks yet. Run the scraper to find venues!</div>';
        return;
    }
    el.innerHTML = top5.map(renderVenueCard).join('');
}

function renderVenueCard(item) {
    const v = item.venue;
    const contacts = item.contacts || [];
    const pendingEmails = (item.pendingEmails || []).filter(c => c.verified !== 'abuse' && c.verified !== 'invalid');
    const cat = (v.category || 'other').toLowerCase().replace(/[\s\/]/g, '_');

    let actionCount = pendingEmails.length;
    if (item.igPending && v.instagram) actionCount++;
    if (item.fbPending && v.facebook) actionCount++;

    let html = `<div class="venue-card" data-zone="${v.zone_priority || 'default'}" onclick="this.classList.toggle('expanded')">`;
    html += `<div class="venue-header"><div class="venue-header-left">`;
    html += `<div class="venue-top"><span class="venue-name">${esc(v.name)}</span>`;
    html += `<span class="category-badge ${cat}">${esc(v.category || 'Other').toUpperCase()}</span>`;
    if (v.zone_priority === 'green' || v.zone_priority === 'yellow') html += `<span class="zone-dot ${v.zone_priority}"></span>`;
    html += `</div><div class="venue-city">${esc(v.city || '')}${v.city && v.state ? ', ' : ''}${esc(v.state || '')}</div>`;
    html += `</div>`;
    if (actionCount > 0) html += `<span class="venue-action-count">${actionCount}</span>`;
    html += `<span class="venue-chevron">&#9654;</span></div>`;

    html += `<div class="venue-details" onclick="event.stopPropagation()">`;
    for (const c of pendingEmails) {
        html += `<div class="action-row"><span class="contact-email">${esc(c.email)}</span>`;
        html += `<button class="btn-action btn-copy" onclick="copyText('${esc(c.email)}')">Copy</button>`;
        html += `<a class="btn-gmail" href="${buildGmailLink(c.email, cat)}" target="_blank">Gmail</a>`;
        html += `<button class="btn-action btn-sent" onclick="markEmailSent('${esc(c.contact_id)}','${esc(v.venue_id)}','${cat}',this)">Sent</button></div>`;
    }
    if (item.igPending && v.instagram) {
        const fc = contacts[0] || { contact_id: '' };
        html += `<div class="action-row"><span class="social-label">Instagram</span>`;
        html += `<button class="btn-action btn-open" onclick="openIGWithTemplate('${esc(v.instagram)}','${cat}')">Open + Copy</button>`;
        html += `<button class="btn-action btn-sent" onclick="markIGSent('${esc(fc.contact_id)}','${esc(v.venue_id)}',this)">Sent</button></div>`;
    }
    if (item.fbPending && v.facebook) {
        const fc = contacts[0] || { contact_id: '' };
        html += `<div class="action-row"><span class="social-label">Facebook</span>`;
        html += `<button class="btn-action btn-open" onclick="openFBWithTemplate('${esc(v.facebook)}','${cat}')">Open + Copy</button>`;
        html += `<button class="btn-action btn-sent" onclick="markFBSent('${esc(fc.contact_id)}','${esc(v.venue_id)}',this)">Sent</button></div>`;
    }
    html += `</div></div>`;
    return html;
}

// === RENDER: HOME — State Grid ===
function renderStateGrid() {
    const el = document.getElementById('stateGrid');
    const states = ['MD', 'VA', 'DC', 'WV', 'PA', 'DE'];
    const venues = (dashboardData && dashboardData.venues) || [];

    el.innerHTML = '<div class="state-grid">' + states.map(s => {
        const count = venues.filter(v => v.state === s).length;
        return `<div class="state-card" style="background-image:url('${STATE_IMAGES[s] || ''}')" onclick="openState('${s}')">
            <div class="state-card-name">${STATE_NAMES[s] || s}</div>
            <div class="state-card-count">${count} venue${count !== 1 ? 's' : ''}</div>
        </div>`;
    }).join('') + '</div>';
}

// === VIEW: STATE (categories) ===
function openState(state) {
    currentState = state;
    document.getElementById('stateTitleText').textContent = STATE_NAMES[state] || state;

    const venues = ((dashboardData && dashboardData.venues) || []).filter(v => v.state === state);
    const catCounts = {};
    venues.forEach(v => {
        const cat = (v.category || 'other').toLowerCase().replace(/[\s\/]/g, '_');
        catCounts[cat] = (catCounts[cat] || 0) + 1;
    });

    // Always show all 6 categories
    const allCats = ['winery', 'museum', 'hotel', 'country_club', 'event', 'restaurant'];
    const el = document.getElementById('stateBody');

    el.innerHTML = '<div class="category-grid">' + allCats.map(c => {
        const count = catCounts[c] || 0;
        return `<div class="category-card" style="background-image:url('${CATEGORY_IMAGES[c] || ''}')" onclick="openCategory('${c}')">
            ${count > 0 ? `<span class="category-card-count">${count}</span>` : ''}
            <span class="category-card-name">${CATEGORY_LABELS[c] || c}</span>
        </div>`;
    }).join('') + '</div>';

    navigateTo('viewState');
}

// === VIEW: CATEGORY (venue list) ===
function openCategory(cat) {
    currentCategory = cat;
    document.getElementById('categoryTitleText').textContent = (CATEGORY_LABELS[cat] || cat) + ' — ' + (STATE_NAMES[currentState] || currentState);

    const venues = ((dashboardData && dashboardData.venues) || []).filter(v =>
        v.state === currentState && (v.category || '').toLowerCase().replace(/[\s\/]/g, '_') === cat
    );

    const el = document.getElementById('categoryBody');
    if (venues.length === 0) {
        el.innerHTML = '<div class="empty-state">No venues found.</div>';
    } else {
        el.innerHTML = venues.map(v => {
            const statusClass = (v.status || 'untouched').replace(/\s/g, '_');
            return `<div class="venue-list-item" onclick="openVenueDetail('${esc(v.venue_id)}')">
                <div>
                    <div class="venue-list-name">${esc(v.name)}</div>
                    <div class="venue-list-city">${esc(v.city || '')}</div>
                </div>
                <span class="status-pill ${statusClass}">${statusClass.replace('_', ' ')}</span>
            </div>`;
        }).join('');
    }

    navigateTo('viewCategory');
}

// === VIEW: VENUE DETAIL ===
function openVenueDetail(venueId) {
    if (!dashboardData) return;
    const venue = (dashboardData.venues || []).find(v => v.venue_id === venueId);
    if (!venue) return;

    const contacts = (dashboardData.contacts || []).filter(c => c.venue_id === venueId);
    const cat = (venue.category || 'other').toLowerCase().replace(/[\s\/]/g, '_');
    const CAT_COLORS = { winery:'#9b59b6', museum:'#3498db', hotel:'#e67e22', country_club:'#27ae60', event:'#e74c3c', restaurant:'#f39c12' };
    const catColor = CAT_COLORS[cat] || 'var(--text-bright)';

    document.getElementById('detailTitleText').textContent = venue.name;

    let html = '';

    // Meta
    html += `<div class="detail-meta">`;
    html += `<span class="category-badge ${cat}">${esc(venue.category || '').toUpperCase()}</span>`;
    html += `<span>${esc(venue.city || '')}${venue.city && venue.state ? ', ' : ''}${esc(venue.state || '')}</span>`;
    if (venue.zone_priority === 'green' || venue.zone_priority === 'yellow') html += `<span class="zone-dot ${venue.zone_priority}"></span>`;
    html += `</div>`;

    // Website
    if (venue.website) html += `<a class="detail-website" href="${esc(venue.website)}" target="_blank">${esc(venue.website)}</a>`;

    // Emails
    const emailContacts = contacts.filter(c => c.email && c.verified !== 'abuse' && c.verified !== 'invalid');
    if (emailContacts.length > 0) {
        html += `<div class="detail-section-label" style="color:${catColor}">Emails</div>`;
        for (const c of emailContacts) {
            if (c.email_sent) {
                html += `<div class="detail-action-row"><span class="detail-email" style="opacity:0.4">${esc(c.email)}</span><span class="detail-done">Sent</span></div>`;
            } else if (c.verified === 'valid') {
                html += `<div class="detail-action-row"><span class="detail-email">${esc(c.email)}</span>`;
                html += `<button class="btn-action btn-copy" onclick="copyText('${esc(c.email)}')">Copy</button>`;
                html += `<a class="btn-gmail" href="${buildGmailLink(c.email, cat)}" target="_blank">Gmail</a>`;
                html += `<button class="btn-action btn-sent" onclick="markEmailSent('${esc(c.contact_id)}','${esc(venue.venue_id)}','${cat}',this)">Sent</button></div>`;
                if (c.name || c.title) html += `<div class="detail-contact-name">${esc(c.name || '')}${c.name && c.title ? ' — ' : ''}${esc(c.title || '')}</div>`;
            } else {
                html += `<div class="detail-action-row"><span class="detail-email" style="opacity:0.5">${esc(c.email)}</span>`;
                html += `<span style="font-size:0.6rem;color:var(--text-dim)">${c.verified || 'unverified'}</span></div>`;
            }
        }
    }

    // Instagram
    html += `<div class="detail-section-label" style="color:${catColor}">Instagram</div>`;
    if (venue.instagram) {
        const igDone = contacts.some(c => c.ig_dm_sent);
        if (igDone) {
            html += `<div class="detail-action-row"><span class="detail-social-label">Instagram DM</span><span class="detail-done">Sent</span></div>`;
        } else {
            const fc = contacts[0] || { contact_id: '' };
            html += `<div class="detail-action-row"><span class="detail-social-label">Instagram DM</span>`;
            html += `<button class="btn-action btn-open" onclick="openIGWithTemplate('${esc(venue.instagram)}','${cat}')">Open + Copy</button>`;
            html += `<button class="btn-action btn-sent" onclick="markIGSent('${esc(fc.contact_id)}','${esc(venue.venue_id)}',this)">Sent</button></div>`;
        }
    } else {
        html += `<div class="detail-action-row"><span style="font-size:0.7rem;color:var(--text-dim)">No Instagram found</span></div>`;
    }

    // Facebook
    html += `<div class="detail-section-label" style="color:${catColor}">Facebook</div>`;
    if (venue.facebook) {
        const fbDone = contacts.some(c => c.fb_msg_sent);
        if (fbDone) {
            html += `<div class="detail-action-row"><span class="detail-social-label">Facebook Message</span><span class="detail-done">Sent</span></div>`;
        } else {
            const fc = contacts[0] || { contact_id: '' };
            html += `<div class="detail-action-row"><span class="detail-social-label">Facebook Message</span>`;
            html += `<button class="btn-action btn-open" onclick="openFBWithTemplate('${esc(venue.facebook)}','${cat}')">Open + Copy</button>`;
            html += `<button class="btn-action btn-sent" onclick="markFBSent('${esc(fc.contact_id)}','${esc(venue.venue_id)}',this)">Sent</button></div>`;
        }
    } else {
        html += `<div class="detail-action-row"><span style="font-size:0.7rem;color:var(--text-dim)">No Facebook found</span></div>`;
    }

    document.getElementById('detailBody').innerHTML = html;
    navigateTo('viewDetail');
}

// === HELPERS ===
function esc(s) {
    if (!s) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// === MAIN LOAD ===
async function loadDashboard() {
    if (!API_URL) { renderTopPicks([]); renderStateGrid(); return; }

    try {
        const resp = await fetch(API_URL);
        const data = await resp.json();
        if (data.status !== 'ok') throw new Error(data.message || 'API error');

        dashboardData = data;
        renderTopPicks(data.topPicks);
        renderStateGrid();
    } catch(e) {
        console.error('Dashboard load error:', e);
    }

    clearTimeout(refreshTimer);
    refreshTimer = setTimeout(loadDashboard, REFRESH_INTERVAL);
}

// === INIT ===
document.addEventListener('DOMContentLoaded', () => { loadDashboard(); });

if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('service-worker.js').catch(err => console.log('SW:', err));
}
</script>

</html>
