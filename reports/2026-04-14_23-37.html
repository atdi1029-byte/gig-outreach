<!DOCTYPE html>
<html lang="en">

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Georgia', serif;
    background: #0c1a22;
    color: #e0e0e0;
    padding: 40px;
    max-width: 900px;
    margin: 0 auto;
    line-height: 1.6;
  }
  h1 {
    color: #6ecfcf;
    font-size: 1.8rem;
    margin-bottom: 5px;
    border-bottom: 2px solid #6ecfcf;
    padding-bottom: 10px;
  }
  .date { color: #999; margin-bottom: 30px; font-size: 0.95rem; }
  h2 {
    color: #e8944c;
    font-size: 1.3rem;
    margin: 30px 0 15px;
    border-left: 4px solid #e8944c;
    padding-left: 12px;
  }
  h3 {
    color: #6ecfcf;
    font-size: 1.1rem;
    margin: 20px 0 10px;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    margin: 15px 0;
    font-size: 0.9rem;
  }
  th {
    background: #1a2e3a;
    color: #6ecfcf;
    padding: 10px 12px;
    text-align: left;
    font-weight: 600;
  }
  td {
    padding: 8px 12px;
    border-bottom: 1px solid #1a2e3a;
  }
  tr:hover { background: rgba(110, 207, 207, 0.05); }
  .stat-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 15px;
    margin: 15px 0;
  }
  .stat-box {
    background: #1a2e3a;
    border-radius: 8px;
    padding: 15px;
    text-align: center;
  }
  .stat-box .num {
    font-size: 2rem;
    font-weight: bold;
    color: #6ecfcf;
  }
  .stat-box .label {
    font-size: 0.85rem;
    color: #999;
    margin-top: 4px;
  }
  .flag {
    background: #2a1a1a;
    border-left: 4px solid #e85050;
    padding: 10px 14px;
    margin: 8px 0;
    border-radius: 0 6px 6px 0;
    font-size: 0.9rem;
  }
  .flag strong { color: #e85050; }
  .contact-name { color: #6ecfcf; }
  .valid { color: #4caf50; }
  .unknown { color: #ff9800; }
  .score {
    display: inline-block;
    background: #e8944c;
    color: #0c1a22;
    font-weight: bold;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 0.85rem;
  }
  .category-pill {
    display: inline-block;
    background: #1a2e3a;
    color: #6ecfcf;
    padding: 2px 8px;
    border-radius: 12px;
    font-size: 0.8rem;
  }
  .social-links {
    font-size: 0.85rem;
    color: #999;
    margin: 5px 0 10px;
  }
  .social-links a {
    color: #6ecfcf;
    text-decoration: none;
  }
  .social-links a:hover {
    text-decoration: underline;
  }
  @media print {
    body { background: #fff; color: #222; padding: 20px; }
    h1 { color: #1a5c5c; border-color: #1a5c5c; }
    h2 { color: #b06a2a; border-color: #b06a2a; }
    h3 { color: #1a5c5c; }
    th { background: #eee; color: #333; }
    td { border-color: #ddd; }
    .stat-box { background: #f5f5f5; border: 1px solid #ddd; }
    .stat-box .num { color: #1a5c5c; }
    .flag { background: #fff0f0; border-color: #cc3333; }
    .flag strong { color: #cc3333; }
    .contact-name { color: #1a5c5c; }
    .score { background: #e8944c; }
    .category-pill { background: #eee; color: #333; }
    tr:hover { background: none; }
  }
</style>
</head>
